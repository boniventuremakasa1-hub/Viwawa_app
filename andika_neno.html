<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Admin - VIWAWA</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="config.js"></script>
</head>
<body style="font-family:sans-serif; text-align:center; padding:20px; background:#f4f4f4;">

    <div style="background:white; padding:20px; border-radius:10px; max-width:400px; margin:auto; border-top:10px solid #800000;">
        <h2 style="color:#800000">VIWAWA ADMIN</h2>
        <input type="text" id="mstari" placeholder="Mstari" style="width:90%; padding:10px; margin:5px;"><br>
        <textarea id="maandiko" placeholder="Maandiko" style="width:90%; padding:10px; margin:5px;"></textarea><br>
        <textarea id="tafakari" placeholder="Tafakari" style="width:90%; padding:10px; margin:5px;"></textarea><br>
        <button onclick="pigaKazi()" style="width:95%; padding:15px; background:#800000; color:white; border:none; cursor:pointer;">HIFADHI SASA</button>
        <h3 id="feedback" style="color:blue;">Tayari kufanya kazi...</h3>
    </div>

    <script>
        function pigaKazi() {
            const fb = document.getElementById('feedback');
            const data = {
                mstari: document.getElementById('mstari').value,
                maandiko: document.getElementById('maandiko').value,
                tafakari: document.getElementById('tafakari').value,
                muda: new Date().toISOString()
            };

            fb.innerText = "Inatuma data kwa nguvu...";
            fb.style.color = "orange";

            // Tunatumia .set kwa kutaja doc maalum
            db.collection("leo").doc("neno").set(data)
            .then(() => {
                fb.innerText = "IMEFANIKIWA! Angalia Firebase sasa hivi.";
                fb.style.color = "green";
                alert("Data imeingia!");
            })
            .catch((err) => {
                fb.innerText = "Imegoma: " + err.message;
                fb.style.color = "red";
                console.error(err);
            });
        }
    </script>
</body>
</html>
