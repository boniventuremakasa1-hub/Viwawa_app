<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neno la Leo - VIWAWA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --maroon: #801313; --bg: #f8f9fa; }
        body { background-color: var(--bg); font-family: sans-serif; margin: 0; }
        .header { background: var(--maroon); color: white; padding: 20px; text-align: center; font-weight: bold; }
        .container { padding: 20px; max-width: 500px; margin: 0 auto; }
        .word-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: none; }
        .verse-ref { color: var(--maroon); font-size: 22px; font-weight: bold; margin-bottom: 10px; display: block; }
        .scripture { font-style: italic; font-size: 18px; margin-bottom: 20px; color: #444; }
        .reflection { font-size: 16px; color: #555; white-space: pre-line; }
        .loader { text-align: center; margin-top: 50px; }
    </style>
</head>
<body>

    <div class="header">NENO LA LEO</div>

    <div class="container">
        <div id="loader" class="loader">Inapakia neno...</div>

        <div id="word-card" class="word-card">
            <span id="v-title" class="verse-ref"></span>
            <div id="v-scripture" class="scripture"></div>
            <hr style="border: 0.5px solid #eee; margin: 15px 0;">
            <div style="font-weight:bold; color:var(--maroon); margin-bottom:10px;">TAFAKARI:</div>
            <div id="v-reflection" class="reflection"></div>
        </div>
    </div>

    <script>
        // Link ya uhakika ya REST API
        const url = "https://firestore.googleapis.com/v1/projects/viwawa-app/databases/(default)/documents/huduma/biblia";

        async function getBibleWord() {
            try {
                const response = await fetch(url);
                const data = await response.json();

                if (data.fields) {
                    // Kuingiza data
                    document.getElementById('v-title').innerText = data.fields.mstari.stringValue;
                    document.getElementById('v-scripture').innerText = data.fields.maandiko.stringValue;
                    document.getElementById('v-reflection').innerText = data.fields.tafakari.stringValue;

                    // Kuonyesha kadi
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('word-card').style.display = 'block';
                } else {
                    document.getElementById('loader').innerText = "Data haijapatikana kwnye database.";
                }
            } catch (error) {
                document.getElementById('loader').innerText = "Angalia internet yako kisha refresh.";
            }
        }

        getBibleWord();
    </script>
</body>
</html>
