<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neno la Leo - VIWAWA</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        // Unganisha na Firebase yako
        const firebaseConfig = {
            apiKey: "AIzaSyDBRoHCdSzu1g9LP9VBjYSeVU4N-wDd-8A",
            authDomain: "viwawa-app.firebaseapp.com",
            projectId: "viwawa-app",
            storageBucket: "viwawa-app.appspot.com",
            messagingSenderId: "238515321557",
            appId: "1:238515321557:web:e000c87895e54d588308d1"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
    </script>

    <style>
        body {
            font-family: 'Georgia', serif;
            background-color: #fdf2f2;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }
        .container {
            width: 90%;
            max-width: 500px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            border: 2px solid #800000;
        }
        .header {
            color: #800000;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            border-bottom: 2px solid #ffd700;
            display: inline-block;
            padding-bottom: 5px;
        }
        .mstari {
            font-size: 20px;
            color: #800000;
            font-style: italic;
            margin-bottom: 15px;
        }
        .maandiko {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 20px;
            background: #fffafa;
            padding: 15px;
            border-radius: 10px;
        }
        .tafakari-box {
            background: #800000;
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-top: 10px;
        }
        .tafakari-title {
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        #loading {
            font-size: 18px;
            color: #800000;
        }
    </style>
</head>
<body>

    <div class="container" id="content-box">
        <div id="loading">Inapakia Neno la Leo...</div>
    </div>

    <script>
        // Kodi ya kusoma data kutoka Firestore
        db.collection("leo").doc("neno").onSnapshot((doc) => {
            const contentBox = document.getElementById('content-box');
            if (doc.exists) {
                const data = doc.data();
                contentBox.innerHTML = `
                    <div class="header">VIWAWA - NENO LA LEO</div>
                    <div class="mstari">${data.mstari}</div>
                    <div class="maandiko">"${data.maandiko}"</div>
                    <div class="tafakari-box">
                        <div class="tafakari-title">Tafakari</div>
                        <div>${data.tafakari}</div>
                    </div>
                `;
            } else {
                contentBox.innerHTML = "Bado neno halijawekwa leo.";
            }
        }, (error) => {
            console.error("Kosa: ", error);
            document.getElementById('loading').innerText = "Imeshindwa kupakia data.";
        });
    </script>

</body>
</html>
