<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neno la Leo - VIWAWA</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDBRoHCdSzu1g9LP9VBjYSeVU4N-wDd-8A",
            authDomain: "viwawa-app.firebaseapp.com",
            projectId: "viwawa-app",
            storageBucket: "viwawa-app.appspot.com",
            messagingSenderId: "238515321557",
            appId: "1:238515321557:web:e000c87895e54d588308d1"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column; /* Inaruhusu VIWAWA kuwa juu ya kadi */
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f9f7f2;
            background-image: url("https://www.transparenttextures.com/patterns/cream-pixels.png");
        }

        /* VIWAWA juu ya kadi */
        .brand-top {
            color: #800000;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 3px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .card {
            width: 88%;
            max-width: 350px;
            background: #ffffff;
            padding: 35px 25px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(128, 0, 0, 0.1);
            position: relative;
        }

        .header {
            color: #800000;
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .mstari {
            font-size: 22px;
            font-weight: 700;
            color: #800000;
            margin-bottom: 15px;
            display: block;
        }

        .maandiko {
            font-size: 17px;
            line-height: 1.8;
            color: #444;
            margin-bottom: 30px;
            padding: 0 10px;
        }

        .tafakari-box {
            background: linear-gradient(135deg, #800000 0%, #4a0000 100%);
            color: white;
            padding: 25px 20px;
            border-radius: 20px;
            font-size: 15px;
            box-shadow: 0 10px 20px rgba(128, 0, 0, 0.2);
        }

        .tafakari-label {
            color: #ffd700;
            font-weight: 700;
            font-size: 11px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: block;
        }

        #loading {
            font-size: 14px;
            color: #800000;
        }
    </style>
</head>
<body>

    <div class="brand-top">VIWAWA</div>

    <div class="card" id="output">
        <div id="loading">Inapakia...</div>
    </div>

    <script>
        db.collection("leo").doc("neno").onSnapshot((doc) => {
            const output = document.getElementById('output');
            if (doc.exists) {
                const d = doc.data();
                output.innerHTML = `
                    <div class="header">NENO LA LEO</div>
                    <span class="mstari">${d.mstari}</span>
                    <div class="maandiko">"${d.maandiko}"</div>
                    <div class="tafakari-box">
                        <span class="tafakari-label">✨ Tafakari ya Leo</span>
                        <div>${d.tafakari}</div>
                    </div>
                `;
            } else {
                output.innerHTML = `<div class="header">NENO LA LEO</div><div>Subiri kidogo...</div>`;
            }
        });
    </script>

</body>
</html>
