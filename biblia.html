<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neno la Leo - VIWAWA</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDBRoHCdSzu1g9LP9VBjYSeVU4N-wDd-8A",
            authDomain: "viwawa-app.firebaseapp.com",
            projectId: "viwawa-app",
            storageBucket: "viwawa-app.appspot.com",
            messagingSenderId: "238515321557",
            appId: "1:238515321557:web:e000c87895e54d588308d1"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();
    </script>

    <style>
        :root {
            --maroon: #7a1010;
            --maroon2: #a01818;
            --maroon3: #4a0808;
            --gold: #e8b84b;
            --gold2: #f5d07a;
            --cream: #fdf8f0;
            --white: #ffffff;
            --text: #1c1212;
            --text-soft: #8a7070;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--cream);
            min-height: 100vh;
            padding-bottom: 100px;
            overflow-x: hidden;
        }

        /* ── HEADER ── */
        .header {
            background: linear-gradient(135deg, var(--maroon3), var(--maroon));
            padding: 18px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(74,8,8,0.3);
        }
        .header-left {
            width: 38px; height: 38px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 18px; cursor: pointer;
            text-decoration: none;
        }
        .header-title {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            color: white;
            letter-spacing: 0.5px;
        }
        .header-share {
            width: 38px; height: 38px;
            background: rgba(232,184,75,0.2);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: var(--gold);
            font-size: 16px;
            cursor: pointer;
        }

        /* ── DATE STRIP ── */
        .date-strip {
            background: linear-gradient(135deg, var(--maroon), var(--maroon2));
            padding: 14px 24px 28px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .date-strip::before {
            content: '✝';
            position: absolute;
            font-size: 120px;
            color: rgba(255,255,255,0.04);
            top: -20px; right: -10px;
            font-family: serif;
        }
        .date-text {
            color: rgba(255,255,255,0.7);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .date-big {
            color: white;
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            margin-top: 4px;
        }

        /* ── MAIN CONTENT ── */
        .content {
            padding: 0 16px;
            margin-top: -18px;
            position: relative;
            z-index: 10;
        }

        /* ── VERSE CARD ── */
        .verse-card {
            background: var(--white);
            border-radius: 24px;
            padding: 30px 24px;
            box-shadow: 0 8px 30px rgba(74,8,8,0.1);
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
            animation: riseUp 0.5s ease both;
        }
        @keyframes riseUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .verse-card::before {
            content: '\201C';
            font-family: 'Playfair Display', serif;
            font-size: 120px;
            color: rgba(122,16,16,0.05);
            position: absolute;
            top: -10px; left: 10px;
            line-height: 1;
        }

        .verse-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #fdf0f0;
            color: var(--maroon);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 5px 12px;
            border-radius: 20px;
            margin-bottom: 18px;
        }

        .verse-ref {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            color: var(--maroon);
            margin-bottom: 16px;
            line-height: 1.2;
        }

        .verse-text {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 17px;
            line-height: 1.85;
            color: #3a2020;
            padding: 16px 0;
            border-top: 1px solid #f5eded;
            border-bottom: 1px solid #f5eded;
            margin-bottom: 18px;
        }

        /* ── ACTIONS ── */
        .actions {
            display: flex;
            gap: 10px;
        }
        .action-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-family: 'DM Sans', sans-serif;
            transition: 0.2s;
        }
        .action-btn:active { transform: scale(0.96); }
        .btn-bookmark {
            background: #fdf0f0;
            color: var(--maroon);
        }
        .btn-share {
            background: var(--maroon);
            color: white;
        }
        .btn-copy {
            background: #f5f5f5;
            color: #555;
        }

        /* ── TAFAKARI CARD ── */
        .tafakari-card {
            background: linear-gradient(145deg, var(--maroon3) 0%, var(--maroon) 100%);
            border-radius: 24px;
            padding: 28px 24px;
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
            animation: riseUp 0.5s 0.15s ease both;
        }
        .tafakari-card::after {
            content: '';
            position: absolute;
            width: 180px; height: 180px;
            background: rgba(255,255,255,0.04);
            border-radius: 50%;
            bottom: -50px; right: -50px;
        }
        .tafakari-label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--gold);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 14px;
        }
        .tafakari-label i { font-size: 14px; }
        .tafakari-text {
            color: rgba(255,255,255,0.92);
            font-size: 15px;
            line-height: 1.8;
            font-weight: 400;
        }

        /* ── PRAYER CARD ── */
        .prayer-card {
            background: linear-gradient(135deg, #f9f4e8, #fdf8f0);
            border: 1.5px solid rgba(232,184,75,0.3);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 16px;
            text-align: center;
            animation: riseUp 0.5s 0.25s ease both;
        }
        .prayer-icon {
            font-size: 32px;
            margin-bottom: 10px;
            display: block;
        }
        .prayer-title {
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            color: var(--maroon);
            margin-bottom: 10px;
        }
        .prayer-text {
            font-size: 13px;
            color: var(--text-soft);
            line-height: 1.7;
            font-style: italic;
        }

        /* ── PROGRESS (Days) ── */
        .streak-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 16px;
            animation: riseUp 0.5s 0.3s ease both;
        }
        .streak-icon {
            width: 52px; height: 52px;
            background: linear-gradient(135deg, var(--gold), var(--gold2));
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }
        .streak-text strong {
            display: block;
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            color: var(--maroon);
        }
        .streak-text span {
            font-size: 12px;
            color: var(--text-soft);
        }

        /* ── LOADING ── */
        .loading-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            gap: 16px;
        }
        .cross-spin {
            font-size: 40px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.9); }
        }
        .loading-text {
            color: var(--text-soft);
            font-size: 14px;
        }

        /* ── EXPIRED ── */
        .expired-wrap {
            text-align: center;
            padding: 50px 20px;
            animation: riseUp 0.5s ease both;
        }
        .expired-icon { font-size: 50px; margin-bottom: 16px; display: block; }
        .expired-title {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            color: var(--maroon);
            margin-bottom: 10px;
        }
        .expired-text { font-size: 14px; color: var(--text-soft); line-height: 1.7; }

        /* ── TOAST ── */
        .toast {
            position: fixed;
            bottom: 110px; left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1c1212;
            color: white;
            padding: 11px 22px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            opacity: 0;
            transition: all 0.35s;
            z-index: 9999;
            white-space: nowrap;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ── BOTTOM NAV ── */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%;
            background: white;
            display: flex; justify-content: space-around;
            padding: 12px 0;
            border-top: 1px solid #eee;
            z-index: 100;
        }
        .nav-item {
            text-decoration: none; color: #aaa;
            font-size: 10px; font-weight: 600;
            text-align: center; flex: 1;
            display: flex; flex-direction: column;
            align-items: center; gap: 3px;
        }
        .nav-item i { font-size: 19px; }
        .nav-item.active { color: var(--maroon); }

        /* bookmark active */
        .bookmarked { background: var(--maroon) !important; color: white !important; }
    </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <a href="home.html" class="header-left">
        <i class="fa-solid fa-arrow-left"></i>
    </a>
    <span class="header-title">Neno la Leo</span>
    <div class="header-share" onclick="sharePage()">
        <i class="fa-solid fa-share-nodes"></i>
    </div>
</div>

<!-- DATE STRIP -->
<div class="date-strip">
    <div class="date-text">Leo ni</div>
    <div class="date-big" id="dateDisplay">—</div>
</div>

<!-- MAIN CONTENT -->
<div class="content" id="mainContent">
    <div class="loading-wrap">
        <span class="cross-spin">✝️</span>
        <span class="loading-text">Inapakia neno la leo...</span>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
    <a href="home.html" class="nav-item"><i class="fa-solid fa-house"></i>HOME</a>
    <a href="biblia.html" class="nav-item active"><i class="fa-solid fa-book-bible"></i>BIBLIA</a>
    <a href="sala.html" class="nav-item"><i class="fa-solid fa-hands-praying"></i>SALA</a>
    <a href="profile.html" class="nav-item"><i class="fa-solid fa-user"></i>WASIFU</a>
</nav>

<script>
    // ── DATE ──
    const siku = ['Jumapili','Jumatatu','Jumanne','Jumatano','Alhamisi','Ijumaa','Jumamosi'];
    const miezi = ['Januari','Februari','Machi','Aprili','Mei','Juni','Julai','Agosti','Septemba','Oktoba','Novemba','Desemba'];
    const leo = new Date();
    document.getElementById('dateDisplay').innerText =
        `${siku[leo.getDay()]}, ${leo.getDate()} ${miezi[leo.getMonth()]} ${leo.getFullYear()}`;

    // ── STREAK ──
    function updateStreak() {
        const today = leo.toDateString();
        const lastVisit = localStorage.getItem('biblia_last_visit');
        let streak = parseInt(localStorage.getItem('biblia_streak') || '0');
        const yesterday = new Date(leo); yesterday.setDate(yesterday.getDate() - 1);

        if (lastVisit === today) {
            // Same day, no change
        } else if (lastVisit === yesterday.toDateString()) {
            streak += 1;
        } else {
            streak = 1;
        }
        localStorage.setItem('biblia_last_visit', today);
        localStorage.setItem('biblia_streak', streak);
        return streak;
    }

    // ── BOOKMARK ──
    let bookmarked = localStorage.getItem('biblia_bookmarked') === 'true';

    function toggleBookmark() {
        bookmarked = !bookmarked;
        localStorage.setItem('biblia_bookmarked', bookmarked);
        const btn = document.getElementById('bookmarkBtn');
        if (bookmarked) {
            btn.classList.add('bookmarked');
            btn.innerHTML = '<i class="fa-solid fa-bookmark"></i> Imehifadhiwa';
            showToast('🔖 Neno limehifadhiwa!');
        } else {
            btn.classList.remove('bookmarked');
            btn.innerHTML = '<i class="fa-regular fa-bookmark"></i> Hifadhi';
            showToast('Bookmark imeondolewa');
        }
    }

    // ── COPY ──
    function copyVerse(mstari, maandiko) {
        const text = `"${maandiko}" — ${mstari}\n\nVIWAWA App | Mapendo Daima 🙏`;
        navigator.clipboard.writeText(text).then(() => showToast('📋 Neno imenakiliwa!'));
    }

    // ── SHARE ──
    function sharePage() {
        if (navigator.share) {
            navigator.share({
                title: 'Neno la Leo - VIWAWA',
                text: 'Soma neno la leo kutoka VIWAWA App 🙏',
                url: window.location.href
            });
        } else {
            showToast('Shiriki: ' + window.location.href);
        }
    }

    function shareVerse(mstari, maandiko) {
        const text = `"${maandiko}" — ${mstari}\n\nVIWAWA App | Mapendo Daima 🙏`;
        if (navigator.share) {
            navigator.share({ title: 'Neno la Leo', text });
        } else {
            navigator.clipboard.writeText(text).then(() => showToast('📋 Neno imenakiliwa kwa kushiriki!'));
        }
    }

    // ── TOAST ──
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    // ── FIREBASE ──
    db.collection("leo").doc("neno").onSnapshot((doc) => {
        const wrap = document.getElementById('mainContent');
        const streak = updateStreak();

        if (!doc.exists) {
            wrap.innerHTML = `
                <div class="expired-wrap">
                    <span class="expired-icon">📖</span>
                    <div class="expired-title">Neno halijapakiwa</div>
                    <p class="expired-text">Admin bado hajaweka neno la leo.<br>Rudi baadaye. Mungu akubariki! 🙏</p>
                </div>`;
            return;
        }

        const d = doc.data();
        const masaa24 = 24 * 60 * 60 * 1000;
        const expired = d.timestamp && (Date.now() - d.timestamp > masaa24);

        if (expired) {
            wrap.innerHTML = `
                <div class="expired-wrap">
                    <span class="expired-icon">⏳</span>
                    <div class="expired-title">Neno la Jana Limetoweka</div>
                    <p class="expired-text">Neno jipya linakuja hivi karibuni.<br>Subiri Admin aweke neno la leo. 🙏</p>
                </div>`;
            return;
        }

        const bkmClass = bookmarked ? 'bookmarked' : '';
        const bkmIcon  = bookmarked ? 'fa-solid fa-bookmark' : 'fa-regular fa-bookmark';
        const bkmText  = bookmarked ? 'Imehifadhiwa' : 'Hifadhi';

        wrap.innerHTML = `
            <!-- VERSE CARD -->
            <div class="verse-card">
                <div class="verse-tag">
                    <i class="fa-solid fa-cross"></i> Neno la Leo
                </div>
                <div class="verse-ref">${d.mstari || '—'}</div>
                <div class="verse-text">"${d.maandiko || '...'}"</div>
                <div class="actions">
                    <button class="action-btn btn-bookmark ${bkmClass}" id="bookmarkBtn" onclick="toggleBookmark()">
                        <i class="${bkmIcon}"></i> ${bkmText}
                    </button>
                    <button class="action-btn btn-share" onclick="shareVerse('${(d.mstari||'').replace(/'/g,"\\'")}', '${(d.maandiko||'').replace(/'/g,"\\'")}')">
                        <i class="fa-solid fa-share"></i> Shiriki
                    </button>
                    <button class="action-btn btn-copy" onclick="copyVerse('${(d.mstari||'').replace(/'/g,"\\'")}', '${(d.maandiko||'').replace(/'/g,"\\'")}')">
                        <i class="fa-regular fa-copy"></i>
                    </button>
                </div>
            </div>

            <!-- TAFAKARI CARD -->
            <div class="tafakari-card">
                <div class="tafakari-label">
                    <i class="fa-solid fa-lightbulb"></i>
                    Tafakari ya Leo
                </div>
                <div class="tafakari-text">${d.tafakari || 'Tafakari inakuja...'}</div>
            </div>

            <!-- PRAYER CARD -->
            <div class="prayer-card">
                <span class="prayer-icon">🙏</span>
                <div class="prayer-title">Sala ya Leo</div>
                <p class="prayer-text">
                    "Bwana, nisaidie kuishi neno hili leo. Uniongoza kwa njia yako ya upendo na amani. Amina."
                </p>
            </div>

            <!-- STREAK CARD -->
            <div class="streak-card">
                <div class="streak-icon">🔥</div>
                <div class="streak-text">
                    <strong>${streak} ${streak === 1 ? 'Siku' : 'Siku'}</strong>
                    <span>Umesoma Neno kwa mfululizo — hongera! 🎉</span>
                </div>
            </div>
        `;
    });
</script>

</body>
</html>
