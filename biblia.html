<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblia Takatifu - Viwawa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --maroon: #801313; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        
        body, html { height: 100%; overflow: hidden; }

        .header {
            background: var(--maroon);
            color: white;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            height: 60px;
        }

        .header h1 { font-size: 16px; text-transform: uppercase; }
        .back-btn { color: white; text-decoration: none; font-size: 20px; }

        /* Hii ndio itafanya Biblia ibaki ndani ya App */
        #bible-container {
            width: 100%;
            height: calc(100% - 60px); /* Inachukua nafasi yote iliyobaki */
            border: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
        <h1>BIBLIA YA KISWAHILI</h1>
    </div>

    <iframe id="bible-container" src="https://www.bible.com/sw/bible/1/GEN.1.SUV"></iframe>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyDBRoHCdSzu1g9lP9VBjYSeVU4N-wdD-8A",
          authDomain: "viwawa-app.firebaseapp.com",
          databaseURL: "https://viwawa-app-default-rtdb.firebaseio.com",
          projectId: "viwawa-app",
          storageBucket: "viwawa-app.firebasestorage.app",
          messagingSenderId: "523436472007",
          appId: "1:523436472007:web:dda010d18fd00ea60070e2",
          measurementId: "G-KCF8FTMBW"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Hii sehemu itasoma mstari wa siku au link mpya ukibadilisha kule Firebase
        db.collection("huduma").doc("biblia").get().then((doc) => {
            if (doc.exists && doc.data().link) {
                document.getElementById('bible-container').src = doc.data().link;
            }
        });
    </script>
</body>
</html>
