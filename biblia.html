<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neno la Leo - Viwawa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { 
            --maroon: #801313; 
            --gold: #b8860b; 
            --bg: #f8f9fa;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { background-color: var(--bg); color: #333; line-height: 1.6; }

        .header {
            background: var(--maroon);
            color: white;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .header h1 { font-size: 18px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .back-btn { color: white; text-decoration: none; font-size: 20px; cursor: pointer; }

        .container { padding: 15px; max-width: 600px; margin: 0 auto; }

        .word-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            border-left: 6px solid var(--maroon);
            margin-top: 5px;
        }

        .verse-ref {
            color: var(--maroon);
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 15px;
            display: block;
        }

        .scripture-box {
            background: #fff9f9;
            padding: 18px;
            border-radius: 12px;
            font-style: italic;
            font-size: 18px;
            color: #444;
            margin-bottom: 25px;
            border: 1px dashed #eecaca;
            position: relative;
        }

        .reflection-title {
            font-size: 19px;
            font-weight: 700;
            color: var(--maroon);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 5px;
        }

        .reflection-body {
            font-size: 16.5px;
            text-align: justify;
            white-space: pre-line;
            color: #333;
        }

        .loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 70vh;
        }

        .spinner {
            width: 45px; height: 45px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--maroon);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
        <h1>Neno la Leo</h1>
    </div>

    <div class="container">
        <div id="loader" class="loader-container">
            <div class="spinner"></div>
            <p style="margin-top:15px; color:var(--maroon); font-weight: 600;">Inapakia Neno...</p>
        </div>

        <div id="main-content" style="display: none;">
            <div class="word-card">
                <span id="verse-title" class="verse-ref"></span>
                
                <div id="scripture-text" class="scripture-box"></div>
                
                <div class="reflection-title">
                    <i class="fa-solid fa-dove"></i> Tafakari ya Leo
                </div>
                <div id="reflection-text" class="reflection-body"></div>
            </div>
        </div>
    </div>

    <script>
        // Hizi ni "Funguo" zako halisi kutoka kwenye picha uliyotuma
        const firebaseConfig = {
          apiKey: "AIzaSyDBRoHCdSzu1g9lP9VBjYSeVU4N-wdD-8A",
          authDomain: "viwawa-app.firebaseapp.com",
          databaseURL: "https://viwawa-app-default-rtdb.firebaseio.com",
          projectId: "viwawa-app",
          storageBucket: "viwawa-app.firebasestorage.app",
          messagingSenderId: "523436472007",
          appId: "1:523436472007:web:dda010d18fd00ea60070e2",
          measurementId: "G-KCF8BFTMBW"
        };

        // Anzisha Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Vuta data kutoka Cloud Firestore (Collection: huduma, Doc: biblia)
        db.collection("huduma").doc("biblia").onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                
                // Jaza data (Tumetumia herufi ndogo kama zilivyo Firebase kwako)
                document.getElementById('verse-title').innerText = data.mstari || "Neno la Mungu";
                document.getElementById('scripture-text').innerText = data.maandiko || "Maandiko hayajapatikana.";
                document.getElementById('reflection-text').innerText = data.tafakari || "Tafakari inakuja hivi punde.";

                // Ficha loader na uonyeshe neno
                document.getElementById('loader').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            } else {
                document.getElementById('loader').innerHTML = "<p>Data haijapatikana kule Firebase.</p>";
            }
        }, (error) => {
            console.error("Kosa: ", error);
            document.getElementById('loader').innerHTML = "<p>Angalia Internet yako na ujaribu tena.</p>";
        });
    </script>
</body>
</html>
