<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neno la Leo - VIWAWA</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        // Unganisha na Firebase yako
        const firebaseConfig = {
            apiKey: "AIzaSyDBRoHCdSzu1g9LP9VBjYSeVU4N-wDd-8A",
            authDomain: "viwawa-app.firebaseapp.com",
            projectId: "viwawa-app",
            storageBucket: "viwawa-app.appspot.com",
            messagingSenderId: "238515321557",
            appId: "1:238515321557:web:e000c87895e54d588308d1"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            
            /* BACKGROUND MPYA YENYE UHAI (Maroon Gradient Pattern) */
            background-color: #800000;
            background-image: 
                linear-gradient(rgba(128, 0, 0, 0.9), rgba(74, 0, 0, 0.95)),
                url("https://www.transparenttextures.com/patterns/cubes.png");
            background-blend-mode: overlay;
        }

        .card {
            width: 85%;
            max-width: 340px; 
            min-height: 480px; 
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 35px;
            text-align: center;
            position: relative;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 215, 0, 0.4);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 10px;
            background: linear-gradient(90deg, #ffd700, #800000, #ffd700);
        }

        .header {
            color: #800000;
            font-size: 18px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            margin-bottom: 5px;
        }

        .divider {
            width: 50px;
            height: 3px;
            background: #ffd700;
            margin: 0 auto 25px;
            border-radius: 2px;
        }

        .mstari {
            font-size: 19px;
            font-weight: 700;
            color: #333;
            background: rgba(255, 215, 0, 0.1);
            padding: 12px 25px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .maandiko {
            font-size: 17px;
            line-height: 1.8;
            color: #444;
            font-style: italic;
            margin-bottom: 35px;
            flex-grow: 1;
            padding: 0 10px;
        }

        .tafakari-box {
            background: linear-gradient(135deg, #800000 0%, #4a0000 100%);
            color: white;
            padding: 25px;
            border-radius: 25px;
            font-size: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .tafakari-label {
            color: #ffd700;
            font-weight: bold;
            font-size: 12px;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tafakari-label::before {
            content: '✨';
            margin-right: 8px;
        }

        #status {
            font-size: 16px;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="card" id="output">
        <div id="status">Inapakia...</div>
    </div>

    <script>
        db.collection("leo").doc("neno").onSnapshot((doc) => {
            const output = document.getElementById('output');
            if (doc.exists) {
                const d = doc.data();
                output.innerHTML = `
                    <div>
                        <div class="header">VIWAWA</div>
                        <div class="divider"></div>
                        <div class="mstari">${d.mstari}</div>
                        <div class="maandiko">"${d.maandiko}"</div>
                    </div>
                    <div class="tafakari-box">
                        <div class="tafakari-label">Tafakari ya Leo</div>
                        <div>${d.tafakari}</div>
                    </div>
                `;
            } else {
                output.innerHTML = `<div class="header">Subiri Kidogo...</div>`;
            }
        });
    </script>

</body>
</html>
