<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neno la Leo - Viwawa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <style>
        :root { --maroon: #801313; --bg: #f8f9fa; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: var(--bg); color: #333; }
        .header { background: var(--maroon); color: white; padding: 20px; display: flex; align-items: center; gap: 15px; }
        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        .word-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-left: 6px solid var(--maroon); display: none; }
        .verse-ref { color: var(--maroon); font-size: 22px; font-weight: bold; margin-bottom: 10px; display: block; }
        .scripture-box { background: #fff9f9; padding: 15px; border-radius: 8px; font-style: italic; font-size: 17px; margin-bottom: 20px; border: 1px dashed #ddd; }
        .reflection-title { font-weight: bold; color: var(--maroon); margin-bottom: 10px; font-size: 18px; }
        .reflection-body { font-size: 16px; text-align: justify; white-space: pre-line; line-height: 1.6; }
        .loader { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; text-align: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--maroon); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" style="color:white; font-size:20px; text-decoration:none;"><i class="fa-solid fa-arrow-left"></i></a>
        <h1 style="font-size:18px;">NENO LA LEO</h1>
    </div>

    <div class="container">
        <div id="loader" class="loader">
            <div class="spinner"></div>
            <p id="msg" style="margin-top:15px; color:var(--maroon);">Inapakia Neno...</p>
        </div>

        <div id="word-card" class="word-card">
            <span id="v-title" class="verse-ref"></span>
            <div id="v-scripture" class="scripture-box"></div>
            <div class="reflection-title"><i class="fa-solid fa-dove"></i> Tafakari ya Leo</div>
            <div id="v-reflection" class="reflection-body"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDBRoHCdSzu1g9lP9VBjYSeVU4N-wdD-8A",
            authDomain: "viwawa-app.firebaseapp.com",
            projectId: "viwawa-app",
            storageBucket: "viwawa-app.firebasestorage.app",
            appId: "1:523436472007:web:dda010d18fd00ea60070e2"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Tunasoma kutoka kwenye collection 'huduma' na document 'biblia'
        db.collection("huduma").doc("biblia").onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                // TUNATUMIA MAJINA YAKO YA KISWAHILI HAPA:
                document.getElementById('v-title').innerText = data.mstari || "Mstari haupo";
                document.getElementById('v-scripture').innerText = data.maandiko || "Maandiko hayajapatikana";
                document.getElementById('v-reflection').innerText = data.tafakari || "Tafakari haijapatikana";

                document.getElementById('loader').style.display = 'none';
                document.getElementById('word-card').style.display = 'block';
            } else {
                document.getElementById('msg').innerText = "Neno halijapatikana kwenye Database.";
            }
        }, (error) => {
            document.getElementById('msg').innerText = "Hitilafu: " + error.message;
        });
    </script>
</body>
</html>
