<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBfTleyc1RFhChV7XXCym-Adfj2i7YAxXg",
        authDomain: "viwawa-app.firebaseapp.com",
        projectId: "viwawa-app",
        appId: "1:523436472007:web:dda010d18fd00ea60070e2"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Jaribio la moja kwa moja
    db.collection("leo").doc("neno").get().then((doc) => {
        if (doc.exists) {
            const data = doc.data();
            document.getElementById('v-title').innerText = data.mstari;
            document.getElementById('v-scripture').innerText = data.maandiko;
            document.getElementById('v-reflection').innerText = data.tafakari;
            document.getElementById('loader').style.display = 'none';
            document.getElementById('word-card').style.display = 'block';
        } else {
            document.getElementById('status-msg').innerText = "Database iko hewani lakini njia ya leo/neno haionekani.";
        }
    }).catch((e) => {
        document.getElementById('status-msg').innerText = "Bado kuna hitilafu: " + e.message;
    });
</script>
