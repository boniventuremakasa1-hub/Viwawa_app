<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neno la Leo - VIWAWA</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDBRoHCdSzu1g9LP9VBjYSeVU4N-wDd-8A",
            authDomain: "viwawa-app.firebaseapp.com",
            projectId: "viwawa-app",
            storageBucket: "viwawa-app.appspot.com",
            messagingSenderId: "238515321557",
            appId: "1:238515321557:web:e000c87895e54d588308d1"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Background iliyoboreshwa na michoro ya 3D hafifu */
            background: radial-gradient(circle at center, #ffffff 0%, #fcecec 100%);
            background-image: url("https://www.transparenttextures.com/patterns/cubes.png");
        }

        .card {
            width: 82%; /* Imepunguzwa upana */
            max-width: 320px; 
            min-height: 450px; /* Imeongezwa urefu */
            background: #ffffff;
            padding: 35px 25px;
            border-radius: 30px;
            text-align: center;
            position: relative;
            /* Kivuli chenye mwanga wa Gold */
            box-shadow: 0 20px 40px rgba(128, 0, 0, 0.15), 0 0 15px rgba(255, 215, 0, 0.3);
            border: 1px solid rgba(255, 215, 0, 0.5);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Mapambo ya mstari wa juu */
        .card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 6px;
            background: #800000;
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
        }

        .header {
            color: #800000;
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .divider {
            width: 40px;
            height: 3px;
            background: #ffd700;
            margin: 0 auto 20px;
        }

        .mstari {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            background: #fff9e6;
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 25px;
            border: 1px dashed #ffd700;
        }

        .maandiko {
            font-size: 16px;
            line-height: 1.8;
            color: #555;
            font-style: italic;
            margin-bottom: 30px;
            flex-grow: 1;
        }

        .tafakari-box {
            background: linear-gradient(135deg, #800000 0%, #4a0000 100%);
            color: white;
            padding: 25px 20px;
            border-radius: 20px;
            font-size: 14px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .tafakari-label {
            color: #ffd700;
            font-weight: bold;
            font-size: 11px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        #status {
            font-size: 14px;
            color: #800000;
        }
    </style>
</head>
<body>

    <div class="card" id="output">
        <div id="status">Inapakia baraka za leo...</div>
    </div>

    <script>
        db.collection("leo").doc("neno").onSnapshot((doc) => {
            const output = document.getElementById('output');
            if (doc.exists) {
                const d = doc.data();
                output.innerHTML = `
                    <div>
                        <div class="header">VIWAWA</div>
                        <div class="divider"></div>
                        <div class="mstari">${d.mstari}</div>
                        <div class="maandiko">"${d.maandiko}"</div>
                    </div>
                    <div class="tafakari-box">
                        <div class="tafakari-label">✨ Tafakari ya Leo</div>
                        <div>${d.tafakari}</div>
                    </div>
                `;
            } else {
                output.innerHTML = `<div class="header">Subiri Kidogo...</div>`;
            }
        });
    </script>

</body>
</html>
