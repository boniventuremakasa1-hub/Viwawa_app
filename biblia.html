<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neno la Leo - VIWAWA</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDBRoHCdSzu1g9LP9VBjYSeVU4N-wDd-8A",
            authDomain: "viwawa-app.firebaseapp.com",
            projectId: "viwawa-app",
            storageBucket: "viwawa-app.appspot.com",
            messagingSenderId: "238515321557",
            appId: "1:238515321557:web:e000c87895e54d588308d1"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();
    </script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        /* Card ya saizi ya kati na nadhifu */
        .card {
            width: 85%;
            max-width: 350px; /* Hii inapunguza upana uwe wa kati */
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            text-align: center;
            border-top: 6px solid #800000;
        }
        .header {
            color: #800000;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 15px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 8px;
        }
        .mstari {
            font-size: 17px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }
        .maandiko {
            font-size: 15px;
            line-height: 1.5;
            color: #555;
            font-style: italic;
            margin-bottom: 15px;
        }
        .tafakari-box {
            background: #800000;
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
        }
        .tafakari-label {
            color: #ffd700;
            font-weight: bold;
            font-size: 12px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="card" id="output">
        <div style="color: #800000;">Inapakia...</div>
    </div>

    <script>
        db.collection("leo").doc("neno").onSnapshot((doc) => {
            const output = document.getElementById('output');
            if (doc.exists) {
                const d = doc.data();
                output.innerHTML = `
                    <div class="header">VIWAWA - NENO LA LEO</div>
                    <div class="mstari">${d.mstari}</div>
                    <div class="maandiko">"${d.maandiko}"</div>
                    <div class="tafakari-box">
                        <div class="tafakari-label">Tafakari fupi</div>
                        <div>${d.tafakari}</div>
                    </div>
                `;
            } else {
                output.innerHTML = "Bado neno halijawekwa.";
            }
        });
    </script>

</body>
</html>
