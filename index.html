<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIWAWA Digital App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
            text-align: center;
        }
        .header {
            margin-bottom: 30px;
            background: var(--tg-theme-button-color, #2481cc);
            color: white;
            padding: 20px;
            border-radius: 15px;
        }
        .card {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🌟 VIWAWA Digital</h1>
        <p>Karibu, <span id="username">Mwana-VIWAWA</span>!</p>
    </div>

    <div class="card">
        <h3>💰 Michango yako</h3>
        <p>Gusa hapa kuona taarifa za malipo.</p>
    </div>

    <div class="card">
        <h3>📖 Neno la Leo</h3>
        <p>"Mungu ni pendo."</p>
    </div>

    <button onclick="closeApp()">Funga App</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); 
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('username').innerText = tg.initDataUnsafe.user.first_name;
        }
        function closeApp() {
            tg.close();
        }
    </script>
</body>
</html>
