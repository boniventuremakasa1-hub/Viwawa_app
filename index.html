<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Viwawa App</title>

<style>
body{
    margin:0;
    height:100vh;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background:#800020; /* Rangi ya Maroon */
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    overflow:hidden;
}

/* Background pattern kwa ajili ya urembo */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background-image: radial-gradient(#ffffff15 2px, transparent 2px);
    background-size:40px 40px;
    opacity:0.4;
}

.container{
    text-align:center;
    z-index:2;
}

/* 1. APP LOGO BOX */
.logo-box{
    background:white;
    width:130px;
    height:130px;
    border-radius:35px;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:auto;
    box-shadow:0 15px 35px rgba(0,0,0,0.3);
}

.logo-box img{
    width:95px;
}

/* 2. APP NAME: VIWAWA */
h1{
    margin-top:25px;
    font-size:42px;
    font-weight: 800;
    letter-spacing:5px;
    margin-bottom: 5px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
}

/* 3. MAELEZO CHINI YA JINA */
.sub-title {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: #ffcc00; /* Rangi ya Dhahabu kwa mvuto */
    margin-bottom: 15px;
}

/* LOADING DOTS */
.loader{
    margin-top:30px;
    display:flex;
    justify-content:center;
    gap:8px;
}

.dot{
    width:10px;
    height:10px;
    background:white;
    border-radius:50%;
    animation: bounce 1s infinite ease-in-out;
}

.dot:nth-child(2){ animation-delay:0.2s; }
.dot:nth-child(3){ animation-delay:0.4s; }

@keyframes bounce{
    0%,80%,100%{ transform:scale(0); }
    40%{ transform:scale(1); }
}

/* 4. MOTO CHINI KABISA (FOOTER) */
.footer{
    position:absolute;
    bottom:30px;
    width:100%;
    text-align:center;
}

.moto-text {
    font-size: 19px;
    font-weight: 500;
    font-style: italic;
    color: #f6f1ee;
    letter-spacing: 1px;
}

.moto-text::before, .moto-text::after {
    content: '"';
    font-size: 24px;
    color: #ffcc00;
}
</style>
</head>

<body>

<div class="container">
    <div class="logo-box">
        <img src="logo.png" alt="Viwawa Logo">
    </div>

    <h1>VIWAWA</h1>

    <div class="sub-title">Vijana Wakatoliki Wafanyakazi</div>

    <div class="loader">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>
</div>

<div class="footer">
    <div class="moto-text">Mapendo Daima</div>
</div>

<script>
    // Inasubiri sekunde 3 kisha inakupeleka home.html
    setTimeout(function(){
        window.location.href = "home.html";
    }, 3500);
</script>

</body>
</html>
