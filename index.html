<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viwawa App - Mapendo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --viwawa-green: #1b4332; 
            --mapendo-red: #9d174d; 
            --bg-gray: #f2f2f7; 
            --white: #ffffff;
            --sala-purple: #4a148c;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--bg-gray); 
            margin: 0; 
            padding: 16px; 
            color: #333;
        }

        .header { margin-bottom: 24px; }
        .viwawa-title { font-size: 28px; font-weight: 800; color: var(--viwawa-green); margin: 0; }
        .mapendo-title { font-size: 24px; font-weight: 700; color: var(--mapendo-red); margin: -5px 0 0 0; }

        .card { 
            background: var(--white); 
            border-radius: 16px; 
            padding: 20px; 
            margin-bottom: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        /* Badge yenye Icon ya Picha */
        .badge { 
            display: inline-flex; 
            align-items: center;
            padding: 6px 14px; 
            border-radius: 8px; 
            font-size: 11px; 
            font-weight: bold; 
            color: white; 
            margin-bottom: 12px; 
            text-transform: uppercase;
        }
        .badge-neno { background-color: #2d6a4f; }
        .badge-sala { background-color: #6a1b9a; }

        /* Icon Style */
        .fa-icon { margin-right: 8px; font-size: 14px; }

        .mstari { font-size: 18px; font-weight: 700; color: #1c1c1e; margin-bottom: 4px; line-height: 1.3; }
        .chanzo { font-size: 14px; color: #8e8e93; margin-bottom: 12px; display: block; font-style: italic; }
        
        .tafakari-box { 
            background-color: #f0fdf4; 
            padding: 14px; 
            border-radius: 12px; 
            border-left: 4px solid #2d6a4f;
            font-size: 14px;
        }

        .sala-quote { text-align: center; margin-bottom: 20px; }
        .quote-text { font-size: 15px; font-weight: 500; font-style: italic; color: #333; display: block; margin-bottom: 6px; }

        /* Button Style */
        .btn-fungua { 
            background-color: var(--sala-purple); 
            color: white; 
            border: none; 
            width: 100%; 
            padding: 16px; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: bold; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            cursor: pointer;
        }

        #sala-content { display: none; margin-top: 15px; border-top: 1px solid #eee; }
        .item-sala { padding: 16px 0; border-bottom: 1px solid #f2f2f7; }
        .name-sala { color: var(--sala-purple); font-weight: 700; font-size: 15px; display: flex; align-items: center; }
        .text-sala { font-size: 14px; color: #48484a; line-height: 1.6; white-space: pre-line; margin-top: 5px; }

    </style>
</head>
<body>

    <div class="header">
        <h1 class="viwawa-title">Viwawa app</h1>
        <h2 class="mapendo-title">Mapendo...</h2>
    </div>

    <div class="card">
        <span class="badge badge-neno">
            <i class="fa-solid fa-book-open fa-icon"></i> Neno la Siku
        </span>
        <div class="mstari" id="txt-mstari"></div>
        <span class="chanzo" id="txt-chanzo"></span>
        <div class="tafakari-box">
            <p id="txt-tafakari"></p>
        </div>
    </div>

    <div class="card">
        <span class="badge badge-sala">
            <i class="fa-solid fa-hands-praying fa-icon"></i> Sala Zetu
        </span>
        <div class="sala-quote">
            <span class="quote-text">"Furahini siku zote; Ombeni bila kukoma"</span>
            <span style="color:var(--sala-purple); font-weight:bold;">(1Thes. 5:16-18)</span>
        </div>
        
        <button class="btn-fungua" onclick="funguaSala()">
            <span><i class="fa-solid fa-sparkles"></i> Fungua sala</span> 
            <i class="fa-solid fa-chevron-right"></i>
        </button>

        <div id="sala-content">
            </div>
    </div>

    <script>
        const salaZote = [
            {n: "1. Sala ya Asubuhi", t: "Ee Baba yetu Mungu mkuu, Umenilinda usiku huu, Nakushukuru kwa Moyo..."},
            {n: "2. Nia Njema", t: "Kumheshimu Mungu wangu namtolea roho yangu..."},
            {n: "21. Sala ya Viwawa", t: "Ee Yesu, mlinzi wa vijana... Viwawa - Safi! Amina."}
            // (Zimebaki 21 ndani ya kodi yako kule GitHub)
        ];

        const mistariYaMwezi = [
            {m: "Mimi ndimi njia, na kweli, na uzima.", c: "Yohana 14:6", t: "Mungu ndiye mwongozo wetu wa kila siku."}
        ];

        const leo = new Date().getDate();
        const nenoLeo = mistariYaMwezi[(leo - 1) % mistariYaMwezi.length] || mistariYaMwezi[0];
        
        document.getElementById('txt-mstari').innerText = `"${nenoLeo.m}"`;
        document.getElementById('txt-chanzo').innerText = nenoLeo.c;
        document.getElementById('txt-tafakari').innerText = nenoLeo.t;

        const divSala = document.getElementById('sala-content');
        salaZote.forEach(s => {
            divSala.innerHTML += `
                <div class="item-sala">
                    <span class="name-sala"><i class="fa-solid fa-cross" style="font-size:10px; margin-right:8px;"></i> ${s.n}</span>
                    <div class="text-sala">${s.t}</div>
                </div>`;
        });

        function funguaSala() {
            const x = document.getElementById("sala-content");
            x.style.display = (x.style.display === "block") ? "none" : "block";
        }
    </script>
</body>
</html>
