<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Viwawa App - Splash Screen</title>

<style>
body{
    margin:0;
    height:100vh;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background:#800020; /* Rangi rasmi ya Maroon */
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    overflow:hidden;
}

/* Background pattern kwa urembo wa kisasa */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background-image: radial-gradient(#ffffff15 2px, transparent 2px);
    background-size:40px 40px;
    opacity:0.4;
}

.container{
    text-align:center;
    z-index:2;
}

/* 1. APP LOGO BOX - Imetengenezwa kutoshea Logo.png yako */
.logo-box{
    background:white;
    width:140px;
    height:140px;
    border-radius:40px;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:auto;
    box-shadow:0 15px 35px rgba(0,0,0,0.4);
    border: 2px solid #ffcc00; /* Mpaka wa dhahabu kuzunguka logo */
}

.logo-box img{
    width:110px; /* Saizi nzuri kwa ajili ya nembo uliyotuma */
    height: auto;
    object-fit: contain;
}

/* 2. APP NAME: VIWAWA */
h1{
    margin-top:25px;
    font-size:45px;
    font-weight: 900;
    letter-spacing:6px;
    margin-bottom: 2px;
    text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
}

/* 3. MAELEZO: Vijana Wakatoliki Wafanyakazi */
.sub-title {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #ffcc00; /* Rangi ya dhahabu */
    margin-bottom: 20px;
}

/* LOADING ANIMATION */
.loader{
    margin-top:20px;
    display:flex;
    justify-content:center;
    gap:10px;
}

.dot{
    width:12px;
    height:12px;
    background:white;
    border-radius:50%;
    animation: bounce 1s infinite ease-in-out;
}

.dot:nth-child(2){ animation-delay:0.2s; }
.dot:nth-child(3){ animation-delay:0.4s; }

@keyframes bounce{
    0%,80%,100%{ transform:scale(0); }
    40%{ transform:scale(1); }
}

/* 4. MOTO: Mapendo Daima */
.footer{
    position:absolute;
    bottom:40px;
    width:100%;
    text-align:center;
}

.moto-text {
    font-size: 20px;
    font-weight: 600;
    font-style: italic;
    color: #ffffff;
    letter-spacing: 1.5px;
}

.moto-text::before, .moto-text::after {
    content: '"';
    font-size: 26px;
    color: #ffcc00;
}
</style>
</head>

<body>

<div class="container">
    <div class="logo-box">
        <img src="Logo.png" alt="Viwawa Logo">
    </div>

    <h1>VIWAWA</h1>

    <div class="sub-title">Vijana Wakatoliki Wafanyakazi</div>

    <div class="loader">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>
</div>

<div class="footer">
    <div class="moto-text">Mapendo Daima</div>
</div>

<script>
    // Inasubiri sekunde 3.5 kisha inafungua ukurasa wa nyumbani
    setTimeout(function(){
        window.location.href = "home.html";
    }, 3500);
</script>

</body>
</html>
