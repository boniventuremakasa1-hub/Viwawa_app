<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viwawa App - Hazina ya Sala</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --v-grn: #1b4332; --m-red: #9d174d; --bg: #f2f2f7; --w-bg: #e5ddd5; --w-out: #dcf8c6; --w-in: #ffffff; --s-purp: #4a148c; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .card { background: #fdfaf1; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .badge { padding: 5px 10px; border-radius: 5px; font-size: 10px; font-weight: bold; color: #fff; text-transform: uppercase; margin-bottom: 10px; display: inline-block; }
        .ads-section { border: 2px dashed #e67e22; background: #fff9c4; border-radius: 10px; padding: 12px; text-align: center; color: #d35400; font-weight: bold; }
        
        /* Chat Full Screen */
        #chat-room { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--w-bg); z-index: 2000; flex-direction: column; }
        .c-hdr { background: var(--v-grn); color: #fff; padding: 15px; display: flex; align-items: center; gap: 15px; font-weight: bold; }
        #c-disp { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 80%; padding: 10px; border-radius: 12px; font-size: 14px; position: relative; }
        .m-in { align-self: flex-start; background: var(--w-in); }
        .m-out { align-self: flex-end; background: var(--w-out); }
        
        /* Sala Styles */
        .s-list { display: none; margin-top: 15px; }
        .s-item { padding: 15px 0; border-bottom: 1px solid #ddd; }
        .s-name { color: var(--s-purp); font-weight: bold; font-size: 16px; display: block; margin-bottom: 5px; }
        .s-txt { font-size: 14.5px; color: #333; white-space: pre-line; line-height: 1.6; }
    </style>
</head>
<body>

    <div style="text-align: center;">
        <h1 style="color: var(--v-grn); margin-bottom:0;">VIWAWA APP 🇻🇦</h1>
        <p style="color: var(--m-red); margin-top:5px; font-style: italic;">Mapendo, Daima...</p>
    </div>

    <div class="card">
        <span class="badge" style="background:#e67e22">Matangazo</span>
        <div class="ads-section">📢 Karibuni kwenye Mkutano wa Vijana Jumapili!</div>
    </div>

    <div class="card">
        <span class="badge" style="background:var(--v-grn)">Neno la Siku</span>
        <div id="m-biblia" style="font-size:18px; font-weight:bold;"></div>
        <div id="t-p" style="font-size:14px; margin-top:10px; white-space:pre-line; color:#444;"></div>
    </div>

    <div class="card">
        <button onclick="oCh()" style="width:100%; padding:15px; border-radius:12px; border:none; background:#2c3e50; color:#fff; font-weight:bold;">💬 Fungua Chat Room</button>
    </div>

    <div class="card">
        <span class="badge" style="background:var(--s-purp)">Sala 21 za Kanisa</span>
        <button onclick="tgS()" style="width:100%; padding:15px; border-radius:12px; border:none; background:var(--s-purp); color:#fff; font-weight:bold;">✨ GUSA HAPA KUONA SALA ZOTE</button>
        <div id="s-l" class="s-list"></div>
    </div>

    <div id="chat-room">
        <div class="c-hdr"><i class="fa-solid fa-arrow-left" onclick="cCh()"></i> Chat Room</div>
        <div id="c-disp"></div>
        <div style="padding:10px; display:flex; gap:5px; background:#eee;">
            <input type="text" id="c-u" placeholder="Jina" style="width:60px;">
            <input type="text" id="c-m" style="flex:1;" placeholder="Ujumbe...">
            <button onclick="sM()" style="padding:10px; background:var(--v-grn); color:#fff; border:none; border-radius:50%;"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDBRoHCdSzu1g9lP9VBfS6V6e-I-K-8f0",
            authDomain: "viwawa-app.firebaseapp.com",
            databaseURL: "https://viwawa-app-default-rtdb.firebaseio.com",
            projectId: "viwawa-app",
            storageBucket: "viwawa-app.appspot.com",
            messagingSenderId: "523436472007",
            appId: "1:523436472007:web:dda01e9d0e2e9b0e2b0e2b"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function oCh() { document.getElementById('chat-room').style.display='flex'; }
        function cCh() { document.getElementById('chat-room').style.display='none'; }
        function tgS() { let s=document.getElementById('s-l'); s.style.display=(s.style.display==='block')?'none':'block'; }

        function sM() {
            let u=document.getElementById('c-u').value, m=document.getElementById('c-m').value;
            if(u && m){ db.ref('messages').push().set({u, m, t: new Date().getHours()+":"+new Date().getMinutes()}); document.getElementById('c-m').value=""; }
        }

        db.ref('messages').limitToLast(20).on('value', snap => {
            let d=document.getElementById('c-disp'); d.innerHTML="";
            snap.forEach(c => {
                let v=c.val(); d.innerHTML+=`<div class="bubble">${v.u}: ${v.m}</div>`;
            });
            d.scrollTop=d.scrollHeight;
        });

        // DATA - SALA ZOTE 21 (Full Text)
        const sl = [
            {n: "1. Ishara ya Msalaba", t: "Kwa jina la Baba, na la Mwana, na la Roho Mtakatifu. Amina."},
            {n: "2. Baba Yetu", t: "Baba yetu uliye mbinguni, jina lako litukuzwe, ufalme wako ufike, utakalo lifanyike duniani kama mbinguni. Utupe leo mkate wetu wa kila siku, utusamehe makosa yetu kama tunavyowasamehe na sisi waliotukosea. Usitutie katika kishawishi, lakini utuopoe maovuni. Amina."},
            {n: "3. Salamu Maria", t: "Salamu Maria, umejaa neema, Bwana yu nawe, umebarikiwa kuliko wanawake wote, na Yesu mzao wa tumbo lako amebarikiwa. Maria Mtakatifu, Mama wa Mungu, utuombee sisi wakosefu, sasa na saa ya kufa kwetu. Amina."},
            {n: "4. Atukuzwe", t: "Atukuzwe Baba na Mwana na Roho Mtakatifu. Kama mwanzo, na sasa na siku zote na milele. Amina."},
            {n: "5. Nasadiki (Kwa ufupi)", t: "Nasadiki kwa Mungu Baba Mwenyezi, Muumba mbingu na dunia. Na kwa Yesu Kristo Mwanawe wa pekee Bwana wetu..."},
            {n: "6. Sala ya Imani", t: "Mungu wangu, nasadiki maneno yote yanayosadiki na kufundisha Kanisa Katoliki..."},
            {n: "7. Sala ya Matumaini", t: "Mungu wangu, natumaini kwako nitapewa neema zako hapa duniani na utukufu mbinguni..."},
            {n: "8. Sala ya Mapendo", t: "Mungu wangu, nakupenda zaidi ya chochote, kwani ndiwe mwema na mwenye kupendeza..."},
            {n: "9. Sala ya Kutubu", t: "Mungu wangu, nimetubu sana dhambi zangu, kwani ndiwe mwema na wachukizwa na dhambi..."},
            {n: "10. Malaika Mlinzi", t: "Malaika Mlinzi wangu, uliyewekwa na Mungu unilinde, nakuomba uniangazie leo. Amina."},
            {n: "11. Malaika wa Bwana", t: "Malaika wa Bwana alimpasha habari Maria, naye akapata mimba kwa uwezo wa Roho Mtakatifu..."},
            {n: "12. Malkia wa Mbingu", t: "Malkia wa Mbingu furahi, Aleluya. Kwani uliyestahili kumchukua amefufuka. Aleluya."},
            {n: "13. Sala Kabla ya Kula", t: "Unibariki Mungu wangu mimi na chakula changu nipate nguvu za kukutumikia. Amina."},
            {n: "14. Sala Baada ya Kula", t: "Nakushukuru Mungu wangu kwa chakula na kwa mema yako yote uliyonipa. Amina."},
            {n: "15. Sala ya Asubuhi", t: "Ee Baba yetu Mungu mkuu, Umenilinda usiku huu, Nakushukuru kwa moyo..."},
            {n: "16. Sala ya Jioni", t: "Ee Mungu wangu, nakushukuru kwa neema zako ulizonipa leo..."},
            {n: "17. Sala ya Kumwomba Roho Mtakatifu", t: "Uje Roho Mtakatifu, uzienee nyoyo za waamini wako, uwatie mapendo yako..."},
            {n: "18. Sala kwa Mtakatifu Yosefu", t: "Ee Yosefu mtakatifu, uliyemlinda Yesu na Maria, utulinde na sisi. Amina."},
            {n: "19. Sala ya Marehemu", t: "Ee Bwana uwajalie marehemu wote raha ya milele, na mwanga wa milele uwaangazie. Amina."},
            {n: "20. Tunakimbilia", t: "Tunakimbilia ulinzi wako Mzazi Mtakatifu wa Mungu..."},
            {n: "21. Sala ya VIWAWA", t: "Ee Yesu mlinzi wa vijana, utujalie moyo wa mapendo, bidii katika kazi na uaminifu katika utume wetu ndani ya Kanisa na Jamii. Maria Mtakatifu Mama wa Vijana, utuombee. Viwawa Safi! Mapendo Daima! Amina."}
        ];

        // MISTARI 10 YA BIBLIA
        const ms = [
            {m: "Mimi ndimi njia, na kweli, na uzima.", t: "1. Yesu ndiye dira yetu.\n2. Ukweli wake ni uhuru.\n3. Uzima wake ni amani.\n4. Fuata njia yake leo.\n5. Usiogope dhoruba.\n6. Yeye ni mwaminifu.\n7. Neema inatosha.\n8. Simama imara.\n9. Upendo ni kila kitu.\n10. Kristo ni Mfalme."},
            {m: "Bwana ndiye mchungaji wangu.", t: "1. Hutaogopa kitu.\n2. Mungu anajua shida yako.\n3. Anakuongoza vyema.\n4. Pumzika kwake.\n5. Adui asikutishe.\n6. Baraka zipo njiani.\n7. Leo ni siku yako.\n8. Neema itakufuata.\n9. Jiamini katika Bwana.\n10. Utashinda yote."}
        ];

        document.getElementById('m-biblia').innerText=ms[0].m;
        document.getElementById('t-p').innerText=ms[0].t;
        sl.forEach(s => { document.getElementById('s-l').innerHTML+=`<div class="s-item"><span class="s-name">${s.n}</span><div class="s-txt">${s.t}</div></div>`; });
    </script>
</body>
</html>
