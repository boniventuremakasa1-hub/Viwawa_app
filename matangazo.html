<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATANGAZO - VIWAWA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { 
            --primary: #800000;
            --accent: #b8860b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body { 
            background-color: #f4f4f4;
            background-image: url('https://www.transparenttextures.com/patterns/pinstriped-suit.png'); /* Background kulingana na screenshot */
            min-height: 100vh;
        }

        .app-bar {
            background-color: var(--primary);
            color: white;
            padding: 15px;
            display: flex;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .back-btn { font-size: 20px; margin-right: 15px; cursor: pointer; }
        .app-bar h1 { font-size: 18px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; }

        .content-area { padding: 15px; }

        /* Muundo wa Kadi ya Tangazo */
        .announcement-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            animation: fadeIn 0.5s ease;
        }

        .announcement-card:active { transform: scale(0.98); }

        .announcement-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: none; /* Inajificha kama hakuna picha */
        }

        .announcement-body { padding: 18px; }

        .date-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .date-tag { font-size: 11px; color: #888; text-transform: uppercase; }

        /* Alama mpya ya Tuma (Paper Plane) kulingana na picha uliyotuma */
        .send-icon { color: var(--accent); font-size: 18px; transform: rotate(-15deg); } /* Inarotate kidogo ifanane */

        .announcement-title {
            color: var(--primary);
            font-size: 18px;
            margin-bottom: 8px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .snippet-text {
            color: #555;
            font-size: 14.5px;
            line-height: 1.6;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2; /* Onyesha mistari 2 tu kwanza */
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Sehemu ya 'Soma Zaidi' (Accordion Logic) */
        .full-text {
            color: #444;
            font-size: 15px;
            line-height: 1.6;
            white-space: pre-line;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out;
        }

        .read-more-btn {
            color: var(--primary);
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            text-decoration: underline;
            display: block;
        }

        /* Wakati ujumbe umefunguka */
        .announcement-card.active .snippet-text { display: none; }
        .announcement-card.active .full-text { max-height: 2000px; } /* Fungua ujumbe mzima */
        .announcement-card.active .read-more-btn { display: none; } /* Ficha kitufe */

        #loading-status { text-align: center; padding: 50px; }
        .loader { background: white; padding: 15px; border-radius: 10px; color: var(--primary); font-weight: bold; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="app-bar">
        <div class="back-btn" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i></div>
        <h1>MATANGAZO - VIWAWA</h1>
    </div>

    <div class="content-area" id="announcementContainer">
        <div id="loading-status">
            <div class="loader">Inapakia...</div>
        </div>
    </div>

    <script>
        // Firebase Config (Tumia Config yako iliyopo)
        const firebaseConfig = {
          apiKey: "AIzaSyDBRoHCdSzu1g9lP9VBjYSeVU4N-wdD-8A",
          authDomain: "viwawa-app.firebaseapp.com",
          databaseURL: "https://viwawa-app-default-rtdb.firebaseio.com",
          projectId: "viwawa-app",
          storageBucket: "viwawa-app.firebasestorage.app",
          messagingSenderId: "523436472007",
          appId: "1:523436472007:web:dda010d18fd00ea60070e2"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Kazi ya kupata na kuchuja matangazo
        function handleMatangazo() {
            const container = document.getElementById('announcementContainer');
            
            // Pata muda wa sasa
            const now = new Date();
            // Pata muda wa wiki moja iliyopita (siku 7)
            const oneWeekAgo = new Date(now.getTime() - (7 * 24 * 60 * 60 * 1000));

            db.collection("matangazo")
                .orderBy("timestamp", "desc") // Panga kwa muda, lile jipya kwanza
                .onSnapshot((querySnapshot) => {
                    container.innerHTML = "";
                    let hasVisibleAds = false;

                    querySnapshot.forEach((doc) => {
                        const data = doc.data();
                        
                        // Angalia kama 'timestamp' ipo na kama haijazidi wiki moja
                        if (data.timestamp && data.timestamp.toDate() >= oneWeekAgo) {
                            hasVisibleAds = true;
                            createAdCard(data, container);
                        }
                    });

                    if (!hasVisibleAds) {
                        container.innerHTML = "<div style='text-align:center; color:#888; margin-top:50px; font-style:italic;'>Hakuna matangazo mapya kwa sasa.</div>";
                    }

                }, (error) => {
                    console.error("Error: ", error);
                    container.innerHTML = "<div class='loader'>Tatizo la internet. Jaribu tena.</div>";
                });
        }

        // Kazi ya kutengeneza kadi ya tangazo
        function createAdCard(data, container) {
            const card = document.createElement('div');
            card.className = 'announcement-card';
            
            // Kama kuna picha, ionyeshe
            let pichaHtml = data.image ? `<img src="${data.image}" class="announcement-img" style="display:block;">` : "";
            
            // Badilisha Firebase timestamp kwenda tarehe inayosomeka
            const tareheInayosomeka = data.timestamp ? data.timestamp.toDate().toLocaleDateString('sw-TZ', { day: '2-digit', month: 'short', year: 'numeric' }) : (data.tarehe || 'Leo');

            card.innerHTML = `
                ${pichaHtml}
                <div class="announcement-body">
                    <div class="date-row">
                        <span class="date-tag">Imechapishwa: ${tareheInayosomeka}</span>
                        <i class="fa-solid fa-paper-plane send-icon"></i> </div>
                    <h2 class="announcement-title">${data.kichwa}</h2>
                    
                    <p class="snippet-text">${data.ujumbe}</p>
                    
                    <span class="read-more-btn" onclick="openAd(this)">Soma Zaidi...</span>
                    
                    <p class="full-text">${data.ujumbe}</p>
                </div>
            `;
            container.appendChild(card);
        }

        // Kazi ya kufungua tangazo zima (Soma Zaidi)
        function openAd(btn) {
            const card = btn.closest('.announcement-card');
            card.classList.add('active'); // Hii itasababisha CSS ifungue ujumbe mzima
        }

        // Anza kushughulikia matangazo
        window.onload = handleMatangazo;
    </script>
</body>
</html>
