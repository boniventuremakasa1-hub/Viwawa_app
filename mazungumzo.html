<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Viwawa chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --maroon: #801313; --bg-chat: #efe7dd; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        
        body { background-color: var(--bg-chat); height: 100vh; display: flex; flex-direction: column; }

        /* Header - Viwawa chat */
        .chat-header { 
            background: var(--maroon); 
            color: white; 
            padding: 10px 15px; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            position: sticky; 
            top: 0; 
            z-index: 1000;
        }
        .chat-header a { color: white; text-decoration: none; }
        .group-info h3 { font-size: 17px; }
        .group-info p { font-size: 11px; opacity: 0.8; }

        /* Chat Messages */
        .messages-container { 
            flex: 1; 
            padding: 15px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 10px;
            padding-bottom: 100px; /* Nafasi ya kutosha juu ya input */
        }

        .message { max-width: 75%; padding: 8px 12px; border-radius: 10px; font-size: 14px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .received { align-self: flex-start; background: white; border-top-left-radius: 0; }
        .sent { align-self: flex-end; background: #dcf8c6; border-top-right-radius: 0; }
        
        .u-name { font-size: 11px; font-weight: bold; color: var(--maroon); margin-bottom: 2px; display: block; }
        .time { font-size: 10px; color: #888; text-align: right; display: block; margin-top: 4px; }

        /* Bottom Input Area - Fixed for Keyboard */
        .chat-footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #f0f0f0;
            padding: 8px 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 1100;
        }

        .input-wrapper {
            flex: 1;
            background: white;
            border-radius: 25px;
            display: flex;
            align-items: center;
            padding: 2px 12px;
            height: 40px; /* Length fupi kama ulivyoomba */
        }

        .plus-btn { color: var(--maroon); font-size: 20px; cursor: pointer; padding-right: 5px; }

        #msgInput {
            flex: 1;
            border: none;
            outline: none;
            font-size: 15px;
            padding: 5px;
        }

        .send-btn { 
            background: var(--maroon); 
            color: white; 
            width: 40px; 
            height: 40px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: none;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <div class="chat-header">
        <a href="index.html"><i class="fa-solid fa-arrow-left"></i></a>
        <div class="group-info">
            <h3>Viwawa chat</h3>
            <p>Maria, Thadeo, Mzee, Wewe...</p>
        </div>
    </div>

    <div class="messages-container" id="chatBox">
        <div class="message received">
            <span class="u-name">Maria</span>
            Tumsifu Yesu Kristo vijana!
            <span class="time">10:00 AM</span>
        </div>
        <div class="message sent">
            Milele Amina! Karibuni kwenye kikao.
            <span class="time">10:07 AM</span>
        </div>
        <div class="message received">
            <span class="u-name">Sr. Maria</span>
            Naomba tujue muda wa sala ya jioni?
            <span class="time">10:15 AM</span>
        </div>
    </div>

    <div class="chat-footer" id="footer">
        <div class="input-wrapper">
            <i class="fa-solid fa-plus plus-btn" onclick="alert('Chagua faili...')"></i>
            <input type="text" id="msgInput" placeholder="Andika ujumbe..." onfocus="adjustView()">
        </div>
        <button class="send-btn" onclick="send()"><i class="fa-solid fa-paper-plane"></i></button>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const msgInput = document.getElementById('msgInput');

        // Hii inahakikisha input haifichwi na keyboard
        function adjustView() {
            setTimeout(() => {
                document.getElementById('footer').scrollIntoView(false);
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 300);
        }

        function send() {
            if(msgInput.value.trim() !== "") {
                const now = new Date();
                const time = now.getHours() + ":" + (now.getMinutes()<10?'0':'') + now.getMinutes();
                
                const m = `<div class="message sent">${msgInput.value}<span class="time">${time}</span></div>`;
                chatBox.innerHTML += m;
                msgInput.value = "";
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        window.onload = () => { chatBox.scrollTop = chatBox.scrollHeight; };
    </script>
</body>
</html>
