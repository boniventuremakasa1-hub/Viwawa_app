<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Viwawa Chat</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background-color:#f6f1ee;
    background-image:url("data:image/svg+xml,%3Csvg width='240' height='240' viewBox='0 0 240 240' xmlns='http://www.w3.org/2000/svg'%3E%3Cg stroke='%23e4d6d6' stroke-width='2' fill='none' stroke-opacity='0.45'%3E%3Cpath d='M20 30h20v20H20z'/%3E%3Ccircle cx='120' cy='40' r='12'/%3E%3Cpath d='M190 30l15 15-15 15-15-15z'/%3E%3Cpath d='M40 120c10-15 30-15 40 0'/%3E%3Cpath d='M150 110h25M162 98v25'/%3E%3Cpath d='M70 200l15-10 15 10'/%3E%3Cpath d='M200 180a10 10 0 110 20 10 10 0 010-20z'/%3E%3Cpath d='M30 180l10 10m0-10l-10 10'/%3E%3Cpath d='M110 160c8 0 15 6 15 15s-7 15-15 15-15-6-15-15 7-15 15-15z'/%3E%3Cpath d='M120 90v30M105 105h30'/%3E%3Crect x='170' y='70' width='26' height='18' rx='3'/%3E%3Cline x1='183' y1='70' x2='183' y2='88'/%3E%3Cpath d='M60 60c10-8 22-8 30 0-8 2-10 6-15 10-5-4-7-8-15-10z'/%3E%3Cpath d='M30 70c0-6 8-10 12-4 4-6 12-2 12 4 0 8-12 14-12 14S30 78 30 70z'/%3E%3C/g%3E%3C/svg%3E");
}

.chat-header{
    background:#800020;
    color:white;
    padding:16px;
    display:flex;
    align-items:center;
    gap:12px;
    position:fixed;
    width:100%;
    top:0;
    z-index:10;
}
.chat-header img{ width:40px;height:40px;border-radius:50%; }

.chat-body{
    margin-top:80px;
    margin-bottom:90px;
    padding:15px;
    display:flex;
    flex-direction:column;
    gap:14px;
}

.message{ display:flex; gap:10px; max-width:80%; align-items:flex-end; }
.message img{ width:32px;height:32px;border-radius:50%; background:#ddd; }
.bubble{
    background:white;
    padding:12px 15px;
    border-radius:18px;
    box-shadow:0 4px 10px rgba(0,0,0,0.06);
    font-size:14px;
}
.user-name { font-size: 10px; font-weight: bold; color: #800020; margin-bottom: 2px; display: block; }
.left{align-self:flex-start;}
.right{align-self:flex-end;flex-direction:row-reverse;}
.right .bubble{border-top-right-radius:6px; background: #fff5f5;}
.left .bubble{border-top-left-radius:6px;}
.time{ font-size:11px;color:#888;margin-top:5px;text-align:right; }

.chat-input{
    position:fixed;
    bottom:0;
    width:100%;
    background:white;
    padding:10px;
    display:flex;
    gap:8px;
    border-top:1px solid #eee;
}
.chat-input input{
    flex:1; padding:12px 15px; border-radius:25px; border:1px solid #ddd; outline:none;
}
.icon-btn{
    width:40px;height:40px;border-radius:50%;
    border:none;background:#f1f1f1;font-size:18px;
}
.send-btn{background:#800020;color:white;}
.image-msg{max-width:200px; border-radius:10px; margin-top:5px; display:block;}
</style>
</head>

<body>

<div class="chat-header">
    <img src="https://via.placeholder.com/100?text=V" id="headerImg">
    <h2>Viwawa Chat</h2>
</div>

<div class="chat-body" id="chatBody"></div>

<div class="chat-input">
    <button class="icon-btn" onclick="addEmoji()">😊</button>
    <input type="file" id="imgInput" hidden accept="image/*" onchange="sendImage(event)">
    <button class="icon-btn" onclick="imgInput.click()">🖼️</button>
    <input type="text" id="msg" placeholder="Andika ujumbe...">
    <button class="icon-btn send-btn" onclick="sendMsg()">➤</button>
</div>

<script>
// CONFIGURATION
const firebaseConfig = {
    apiKey: "AIzaSyDBRoHCdSzu1g9LP9VBjYSeVU4N-wDd-8A",
    authDomain: "viwawa-app.firebaseapp.com",
    projectId: "viwawa-app",
    storageBucket: "viwawa-app.appspot.com",
    messagingSenderId: "238515321557",
    appId: "1:238515321557:web:e000c87895e54d588308d1"
};
if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
const db = firebase.firestore();

// USER DATA
const profile = JSON.parse(localStorage.getItem('viwawa_profile')) || { name: "Mwanachama", image: "https://i.pravatar.cc/100" };
const myName = profile.name;
const myPic = profile.image;

// LISTENING FOR MESSAGES
db.collection("chats").orderBy("time", "asc").onSnapshot((snapshot) => {
    let chat = document.getElementById('chatBody');
    chat.innerHTML = "";
    snapshot.forEach((doc) => {
        let data = doc.data();
        let isMe = data.user === myName;
        let div = document.createElement('div');
        div.className = `message ${isMe ? 'right' : 'left'}`;
        
        let content = data.image ? `<img src="${data.image}" class="image-msg"/>` : data.text;
        
        div.innerHTML = `
            <img src="${data.pic || 'https://i.pravatar.cc/100'}">
            <div class="bubble">
                <span class="user-name">${isMe ? 'Mimi' : data.user}</span>
                ${content}
                <div class="time">${data.displayTime || ''} ${isMe ? '✓✓' : ''}</div>
            </div>`;
        chat.appendChild(div);
    });
    window.scrollTo(0, document.body.scrollHeight);
});

// SEND TEXT MESSAGE
async function sendMsg(){
    let msgInput = document.getElementById('msg');
    let text = msgInput.value.trim();
    if(text === "") return;

    msgInput.value = "";
    await db.collection("chats").add({
        user: myName,
        pic: myPic,
        text: text,
        displayTime: getTime(),
        time: firebase.firestore.FieldValue.serverTimestamp()
    });
}

// SEND IMAGE
function sendImage(e){
    let file = e.target.files[0];
    if(!file) return;
    let reader = new FileReader();
    reader.onload = async function(){
        await db.collection("chats").add({
            user: myName,
            pic: myPic,
            image: reader.result,
            displayTime: getTime(),
            time: firebase.firestore.FieldValue.serverTimestamp()
        });
    }
    reader.readAsDataURL(file);
}

function addEmoji(){ document.getElementById('msg').value += "😊"; }

function getTime(){
    let d = new Date();
    return d.getHours() + ":" + String(d.getMinutes()).padStart(2, '0');
}

// Enter key to send
document.getElementById('msg').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMsg(); });
</script>

</body>
</html>
