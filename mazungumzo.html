<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Viwawa chat 💬</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --maroon: #801313; 
            --chat-bg: #e5ddd5; 
            --my-bubble: #801313; 
            --other-bubble: #ffffff; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body, html { height: 100%; width: 100%; overflow: hidden; background-color: var(--chat-bg); }

        .app-container {
            display: flex; flex-direction: column; height: 100vh; width: 100vw;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-size: contain;
        }

        /* Header kamilifu na Picha ya Group */
        .chat-header {
            background: var(--maroon); color: white; padding: 10px 15px;
            display: flex; align-items: center; gap: 10px; z-index: 100; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .back-btn { color: white; text-decoration: none; font-size: 20px; }
        
        /* Picha ya Group juu */
        .group-img { 
            width: 42px; height: 42px; border-radius: 50%; 
            background: #fff; overflow: hidden; border: 1px solid rgba(255,255,255,0.3);
            flex-shrink: 0;
        }
        .group-img img { width: 100%; height: 100%; object-fit: cover; }

        .group-info { flex: 1; }
        .group-info h2 { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 5px; }
        .group-info p { font-size: 11px; opacity: 0.8; }

        /* Messages Area */
        .messages-area { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg-row { display: flex; gap: 8px; max-width: 88%; margin-bottom: 4px; }
        
        .msg-row.me { align-self: flex-end; flex-direction: row-reverse; }
        .msg-row.other { align-self: flex-start; }

        /* Picha za Wanachama */
        .user-pic { 
            width: 32px; height: 32px; border-radius: 50%; 
            background: #ddd; overflow: hidden; flex-shrink: 0; 
            align-self: flex-end; border: 1px solid rgba(0,0,0,0.1); 
        }
        .user-pic img { width: 100%; height: 100%; object-fit: cover; }

        .bubble { padding: 8px 12px; border-radius: 15px; font-size: 14px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); position: relative; }
        .me .bubble { background: var(--my-bubble); color: white; border-bottom-right-radius: 2px; }
        .other .bubble { background: var(--other-bubble); color: #333; border-bottom-left-radius: 2px; }

        .sender-name { font-size: 11px; font-weight: 700; margin-bottom: 2px; display: block; }
        .other .sender-name { color: var(--maroon); }
        .me .sender-name { color: #ffca28; text-align: right; }

        .msg-footer { display: flex; align-items: center; justify-content: flex-end; gap: 4px; margin-top: 4px; }
        .time { font-size: 10px; opacity: 0.7; }
        .ticks { font-size: 13px; color: #fff; opacity: 0.8; }
        .ticks.read { color: #4fc3f7; }

        /* Input Bar */
        .input-bar { padding: 10px; display: flex; align-items: center; gap: 8px; }
        .input-box-wrapper { 
            flex: 1; background: white; border-radius: 25px; 
            padding: 5px 12px; display: flex; align-items: center; gap: 10px; 
        }
        .input-box-wrapper input { flex: 1; border: none; padding: 10px 0; outline: none; font-size: 15px; }
        
        .action-btn { 
            width: 48px; height: 48px; background: var(--maroon); 
            color: white; border-radius: 50%; border: none; 
            font-size: 20px; display: flex; align-items: center; 
            justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); 
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="chat-header">
            <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
            <div class="group-img">
                <img src="https://cdn-icons-png.flaticon.com/512/681/681494.png" id="groupIcon">
            </div>
            <div class="group-info">
                <h2>Viwawa chat 💬</h2>
                <p>Maria, Thadeo, Mzee, Wewe...</p>
            </div>
            <i class="fa-solid fa-ellipsis-vertical"></i>
        </div>

        <div class="messages-area" id="chatBox">
            <div class="msg-row other">
                <div class="user-pic"><img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"></div>
                <div class="bubble">
                    <span class="sender-name">Maria</span>
                    Tumsifu Yesu Kristo vijana! 💬
                    <div class="msg-footer">
                        <span class="time">10:00 AM</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="input-bar">
            <div class="input-box-wrapper">
                <i class="fa-regular fa-face-smile"></i>
                <input type="text" id="userInput" placeholder="Andika ujumbe...">
                <i class="fa-solid fa-paperclip"></i>
                <i class="fa-solid fa-camera"></i>
            </div>
            <button class="action-btn" id="sendBtn">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        // Hapa inachukua picha yako uliyoweka kwenye Profile
        function getMyPic() {
            const profile = JSON.parse(localStorage.getItem('viwawa_profile'));
            return (profile && profile.image) ? profile.image : 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
        }

        sendBtn.onclick = () => {
            const text = userInput.value.trim();
            if(!text) return;

            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const myPic = getMyPic();

            const html = `
                <div class="msg-row me">
                    <div class="user-pic"><img src="${myPic}"></div>
                    <div class="bubble">
                        <span class="sender-name">Mimi</span>
                        ${text}
                        <div class="msg-footer">
                            <span class="time">${time}</span>
                            <span class="ticks read"><i class="fa-solid fa-check-double"></i></span>
                        </div>
                    </div>
                </div>
            `;
            
            chatBox.innerHTML += html;
            userInput.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;
        };

        userInput.addEventListener("keypress", (e) => { if(e.key === "Enter") sendBtn.click(); });
    </script>
</body>
</html>
