<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mazungumzo - VIWAWA</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        // Unganisho la Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDBRoHCdSzu1g9LP9VBjYSeVU4N-wDd-8A",
            authDomain: "viwawa-app.firebaseapp.com",
            projectId: "viwawa-app",
            storageBucket: "viwawa-app.appspot.com",
            messagingSenderId: "238515321557",
            appId: "1:238515321557:web:e000c87895e54d588308d1"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #f0f2f5; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* Header ya Maroon */
        .header { 
            background: #800000; 
            color: white; 
            padding: 15px 20px; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 100;
        }
        .header a { color: white; text-decoration: none; font-size: 20px; }
        .header h3 { font-size: 18px; font-weight: 600; }

        /* Eneo la Meseji */
        #chat-window { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            background-image: url("https://www.transparenttextures.com/patterns/cubes.png");
        }
        
        .message { 
            max-width: 80%; 
            padding: 10px 14px; 
            border-radius: 15px; 
            font-size: 14.5px; 
            position: relative; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            word-wrap: break-word;
        }
        
        /* Meseji za wengine */
        .msg-other { 
            background: white; 
            align-self: flex-start; 
            color: #333; 
            border-bottom-left-radius: 2px; 
        }
        
        /* Meseji zangu */
        .msg-me { 
            background: #800000; 
            align-self: flex-end; 
            color: white; 
            border-bottom-right-radius: 2px; 
        }
        
        .user-name { 
            font-size: 10px; 
            font-weight: 700; 
            margin-bottom: 4px; 
            display: block; 
            text-transform: uppercase;
            opacity: 0.7;
        }

        /* Sehemu ya Kuandikia */
        .input-area { 
            background: white; 
            padding: 12px 15px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            border-top: 1px solid #ddd;
        }
        input { 
            flex: 1; 
            border: 1px solid #eee; 
            padding: 12px 18px; 
            border-radius: 25px; 
            outline: none; 
            background: #f8f9fa;
            font-size: 14px;
        }
        input:focus { border-color: #800000; background: white; }
        
        button { 
            background: #800000; 
            color: white; 
            border: none; 
            width: 45px; 
            height: 45px; 
            border-radius: 50%; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 18px; 
            transition: 0.2s;
        }
        button:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html"><i class="fa-solid fa-arrow-left"></i></a>
        <h3>Mazungumzo ya VIWAWA</h3>
    </div>

    <div id="chat-window">
        </div>

    <div class="input-area">
        <input type="text" id="msg-input" placeholder="Andika ujumbe hapa..." autocomplete="off">
        <button onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
    </div>

    <script>
        // Pata jina la mtumiaji kutoka kwenye Profile iliyohifadhiwa
        const profileData = JSON.parse(localStorage.getItem('viwawa_profile')) || { name: "Mwanachama" };
        const myName = profileData.name;

        const chatWindow = document.getElementById('chat-window');

        // 1. KUSOMA MESEJI (Real-time)
        db.collection("chats").orderBy("time", "asc").onSnapshot((snapshot) => {
            chatWindow.innerHTML = ""; // Safisha kioo kabla ya kupakia upya
            snapshot.forEach((doc) => {
                const data = doc.data();
                const isMe = data.user === myName;
                
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${isMe ? 'msg-me' : 'msg-other'}`;
                
                msgDiv.innerHTML = `
                    <span class="user-name">${isMe ? 'Mimi' : data.user}</span>
                    <div>${data.text}</div>
                `;
                chatWindow.appendChild(msgDiv);
            });
            // Shusha scroll mpaka chini meseji mpya inapoingia
            chatWindow.scrollTop = chatWindow.scrollHeight;
        });

        // 2. KUTUMA MESEJI
        async function sendMessage() {
            const input = document.getElementById('msg-input');
            const ujumbe = input.value.trim();

            if (ujumbe === "") return; // Usitume kitu kitupu

            input.value = ""; // Safisha kisanduku cha kuandikia
            
            try {
                await db.collection("chats").add({
                    user: myName,
                    text: ujumbe,
                    time: firebase.firestore.FieldValue.serverTimestamp()
                });
            } catch (error) {
                console.error("Error sending message: ", error);
                alert("Imeshindwa kutuma, angalia internet yako.");
            }
        }

        // Ruhusu kutuma kwa kubonyeza kitufe cha 'Enter'
        document.getElementById('msg-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>

</body>
</html>
