<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mazungumzo - VIWAWA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --maroon: #801313; --bg-chat: #e5ddd5; --white: #ffffff; --msg-in: #ffffff; --msg-out: #dcf8c6; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { background-color: var(--bg-chat); height: 100vh; display: flex; flex-direction: column; }

        /* Header */
        .chat-header { 
            background: var(--maroon); 
            color: white; 
            padding: 10px 15px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            position: sticky; 
            top: 0; 
            z-index: 1000;
        }
        .chat-header a { color: white; text-decoration: none; font-size: 18px; }
        .group-img { width: 40px; height: 40px; border-radius: 50%; background: #eee; }
        .group-info h3 { font-size: 16px; }
        .group-info p { font-size: 11px; opacity: 0.8; }

        /* Area ya Meseji */
        .messages-container { 
            flex: 1; 
            padding: 15px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 10px;
            padding-bottom: 80px; /* Nafasi ya kutosha chini */
        }

        .message { max-width: 75%; padding: 8px 12px; border-radius: 10px; font-size: 14px; position: relative; line-height: 1.4; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .received { align-self: flex-start; background: var(--msg-in); border-top-left-radius: 0; }
        .sent { align-self: flex-end; background: var(--msg-out); border-top-right-radius: 0; }
        
        .user-name { font-size: 11px; font-weight: 700; color: var(--maroon); display: block; margin-bottom: 2px; }
        .time { font-size: 10px; color: #888; display: block; text-align: right; margin-top: 4px; }

        /* Input Area (Imepunguzwa Ukubwa) */
        .chat-input-area { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            background: #f0f0f0; 
            padding: 8px 10px; 
            display: flex; 
            align-items: flex-end; 
            gap: 8px; 
        }

        .input-box { 
            flex: 1; 
            background: white; 
            border-radius: 25px; 
            display: flex; 
            align-items: flex-end; 
            padding: 5px 12px; 
            min-height: 40px;
        }

        .input-box textarea { 
            flex: 1; 
            border: none; 
            outline: none; 
            padding: 8px 5px; 
            font-size: 15px; 
            resize: none; 
            max-height: 100px; 
            background: transparent;
        }

        .input-box i { color: #888; padding: 10px; cursor: pointer; }

        .send-btn { 
            background: var(--maroon); 
            color: white; 
            width: 42px; 
            height: 42px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: none; 
            font-size: 18px; 
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="chat-header">
        <a href="index.html"><i class="fa-solid fa-arrow-left"></i></a>
        <div class="group-img"><img src="https://via.placeholder.com/40" style="width:100%; border-radius:50%;"></div>
        <div class="group-info">
            <h3>VIWAWA PAROKIA</h3>
            <p>Washiriki 124, Mtandaoni</p>
        </div>
    </div>

    <div class="messages-container" id="chatBox">
        <div class="message received">
            <span class="user-name">Dominick</span>
            Tumsifu Yesu Kristo wapendwa!
            <span class="time">10:05 AM</span>
        </div>
        
        <div class="message sent">
            Milele Amina! Karibuni kwenye kikao.
            <span class="time">10:07 AM</span>
        </div>

        <div class="message received">
            <span class="user-name">Sr. Maria</span>
            Naomba tujue muda wa sala ya jioni utakuwa saa ngapi leo?
            <span class="time">10:15 AM</span>
        </div>
    </div>

    <div class="chat-input-area">
        <div class="input-box">
            <i class="fa-regular fa-face-smile"></i>
            <textarea id="msgInput" rows="1" placeholder="Andika ujumbe..." oninput="autoGrow(this)"></textarea>
            <i class="fa-solid fa-paperclip"></i>
            <i class="fa-solid fa-camera"></i>
        </div>
        <button class="send-btn" onclick="sendMsg()"><i class="fa-solid fa-paper-plane"></i></button>
    </div>

    <script>
        // Inafanya sehemu ya kuandikia ikue kulingana na maandishi
        function autoGrow(element) {
            element.style.height = "5px";
            element.style.height = (element.scrollHeight) + "px";
        }

        // Kutuma meseji
        function sendMsg() {
            const input = document.getElementById('msgInput');
            const chatBox = document.getElementById('chatBox');
            
            if(input.value.trim() !== "") {
                const now = new Date();
                const timeStr = now.getHours() + ":" + (now.getMinutes()<10?'0':'') + now.getMinutes() + (now.getHours() >= 12 ? " PM" : " AM");

                const newMsg = `
                    <div class="message sent">
                        ${input.value}
                        <span class="time">${timeStr}</span>
                    </div>
                `;
                
                chatBox.innerHTML += newMsg;
                input.value = "";
                input.style.height = "auto"; // Inarudisha urefu wa kawaida baada ya kutuma
                chatBox.scrollTop = chatBox.scrollHeight; // Inashusha scroll chini
            }
        }

        // Inahakikisha inashuka chini kabisa ikifunguka
        window.onload = function() {
            const chatBox = document.getElementById('chatBox');
            chatBox.scrollTop = chatBox.scrollHeight;
        };
    </script>
</body>
</html>
