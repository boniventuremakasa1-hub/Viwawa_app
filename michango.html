<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MICHANGO - VIWAWA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary: #8d1212; --success: #2e7d32; --danger: #c62828; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f8f9fa; color: #333; padding-bottom: 50px; }

        .app-bar { background: var(--primary); color: white; padding: 15px; display: flex; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .app-bar i { font-size: 20px; cursor: pointer; margin-right: 15px; }
        .app-bar h1 { font-size: 18px; text-transform: uppercase; }

        .container { padding: 15px; }

        .selection-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; transition: 0.3s; }
        .card-left { display: flex; align-items: center; gap: 15px; }
        .icon-circle { width: 45px; height: 45px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .bg-ada { background: #fff0f0; color: var(--primary); }
        .bg-mingine { background: #f0f7ff; color: #1976d2; }
        .card-info h3 { font-size: 16px; font-weight: bold; }
        .card-info p { font-size: 12px; color: #888; }

        #view-ada, #view-mingine { display: none; }
        .spreadsheet-container { background: white; border-radius: 12px; padding: 10px; overflow-x: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; min-width: 700px; font-size: 12px; }
        th, td { border: 1px solid #eee; padding: 12px 8px; text-align: center; }
        th { background: #f9f9f9; font-weight: bold; color: var(--primary); }
        .member-name { text-align: left; position: sticky; left: 0; background: white; font-weight: bold; padding-left: 10px; min-width: 150px; z-index: 5; }
        .check-icon { color: var(--success); font-weight: bold; font-size: 16px; }
        .cross-icon { color: #ccc; font-size: 14px; }

        .mchango-list-item { background: white; border-radius: 12px; padding: 15px; margin-bottom: 10px; border-left: 5px solid var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .mchango-top { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .mchango-title { font-weight: bold; font-size: 14px; color: var(--primary); text-transform: uppercase; }
        .mchango-amt { font-weight: 900; color: #333; }
        .sub-nav { color: var(--primary); font-weight: bold; margin-bottom: 15px; cursor: pointer; display: flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>

    <div class="app-bar">
        <i class="fa-solid fa-arrow-left" id="mainBack" onclick="window.history.back()"></i>
        <h1 id="titleText">Michango</h1>
    </div>

    <div class="container">
        
        <div id="menu-area">
            <div class="selection-card" onclick="toggleView('ada')">
                <div class="card-left">
                    <div class="icon-circle bg-ada"><i class="fa-solid fa-calendar-check"></i></div>
                    <div class="card-info">
                        <h3>Ada ya Mwezi</h3>
                        <p>Januari - Desemba</p>
                    </div>
                </div>
                <i class="fa-solid fa-chevron-right" style="color:#ccc;"></i>
            </div>

            <div class="selection-card" onclick="toggleView('mingine')">
                <div class="card-left">
                    <div class="icon-circle bg-mingine"><i class="fa-solid fa-hand-holding-dollar"></i></div>
                    <div class="card-info">
                        <h3>Michango Mingine</h3>
                        <p>Kambi, Ujenzi, Sherehe n.k</p>
                    </div>
                </div>
                <i class="fa-solid fa-chevron-right" style="color:#ccc;"></i>
            </div>
        </div>

        <div id="view-ada">
            <div class="sub-nav" onclick="resetPage()"><i class="fa-solid fa-chevron-left"></i> Rudi</div>
            <div class="spreadsheet-container">
                <table>
                    <thead>
                        <tr>
                            <th class="member-name">Mwanachama</th>
                            <th>Jan</th><th>Feb</th><th>Mar</th><th>Apr</th><th>Mei</th><th>Jun</th>
                            <th>Jul</th><th>Ago</th><th>Sep</th><th>Okt</th><th>Nov</th><th>Des</th>
                        </tr>
                    </thead>
                    <tbody id="adaTableBody">
                        </tbody>
                </table>
            </div>
        </div>

        <div id="view-mingine">
            <div class="sub-nav" onclick="resetPage()"><i class="fa-solid fa-chevron-left"></i> Rudi</div>
            <div id="otherContributionsList"></div>
        </div>

    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDBRoHCdSzu1g9lP9VBjYSeVU4N-wdD-8A",
            authDomain: "viwawa-app.firebaseapp.com",
            projectId: "viwawa-app",
            storageBucket: "viwawa-app.firebasestorage.app",
            messagingSenderId: "523436472007",
            appId: "1:523436472007:web:dda010d18fd00ea60070e2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function toggleView(target) {
            document.getElementById('menu-area').style.display = 'none';
            if(target === 'ada') {
                document.getElementById('view-ada').style.display = 'block';
                document.getElementById('titleText').innerText = "Ada ya Mwezi";
                loadAdaTable();
            } else {
                document.getElementById('view-mingine').style.display = 'block';
                document.getElementById('titleText').innerText = "Michango Mingine";
                loadOtherContributions();
            }
        }

        function resetPage() {
            document.getElementById('menu-area').style.display = 'block';
            document.getElementById('view-ada').style.display = 'none';
            document.getElementById('view-mingine').style.display = 'none';
            document.getElementById('titleText').innerText = "Michango";
        }

        // LOAD SPREADSHEET DATA (ADA)
        function loadAdaTable() {
            const tbody = document.getElementById('adaTableBody');
            const miezi = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Ago', 'Sep', 'Okt', 'Nov', 'Des'];

            db.collection("wanachama").orderBy("jina").onSnapshot(snap => {
                tbody.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    let row = `<tr><td class="member-name">${d.jina}</td>`;
                    
                    miezi.forEach(mwezi => {
                        // Kama mwezi ni true, weka ✔, vinginevyo weka ✘
                        const icon = d[mwezi] ? '<span class="check-icon">✔</span>' : '<span class="cross-icon">✘</span>';
                        row += `<td>${icon}</td>`;
                    });
                    
                    row += `</tr>`;
                    tbody.innerHTML += row;
                });
            });
        }

        function loadOtherContributions() {
            const listDiv = document.getElementById('otherContributionsList');
            db.collection("michango").orderBy("tarehe", "desc").onSnapshot((snapshot) => {
                listDiv.innerHTML = "";
                snapshot.forEach((doc) => {
                    const d = doc.data();
                    const dateStr = d.tarehe ? d.tarehe.toDate().toLocaleDateString('sw-TZ') : "---";
                    listDiv.innerHTML += `
                        <div class="mchango-list-item">
                            <div class="mchango-top">
                                <span class="mchango-title">${d.aina}</span>
                                <span class="mchango-amt">Tsh ${Number(d.kiasi).toLocaleString()}</span>
                            </div>
                            <div class="mchango-user"><i class="fa-solid fa-user-check"></i> ${d.jina}</div>
                            <div class="mchango-date"><i class="fa-regular fa-calendar"></i> ${dateStr}</div>
                        </div>
                    `;
                });
            });
        }
    </script>
</body>
</html>
