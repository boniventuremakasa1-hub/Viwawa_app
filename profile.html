<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wasifu - Viwawa App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --maroon: #801313;
            --light-gray: #f4f4f4;
            --text-dark: #333;
            --text-gray: #777;
            --yellow: #ffc107;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--white); padding-bottom: 100px; }

        /* Header Section */
        .profile-header {
            background-color: var(--maroon);
            padding: 20px 20px 40px;
            text-align: center;
            color: var(--white);
            border-radius: 0 0 45px 45px;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .back-nav { display: flex; align-items: center; margin-bottom: 10px; }
        .back-btn { color: white; text-decoration: none; font-size: 20px; cursor: pointer; }

        .img-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 15px;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--white);
            object-fit: cover;
            background: #fff;
            display: block;
        }

        .cam-btn {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: var(--yellow);
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dark);
            border: 3px solid var(--maroon);
            cursor: pointer;
        }

        .profile-header h2 { font-size: 22px; font-weight: 700; text-transform: uppercase; margin-top: 10px; }
        .profile-header p { font-size: 13px; opacity: 0.8; font-weight: 400; margin-top: 2px; }

        /* Form Fields */
        .container { padding: 25px 20px; }
        .section-title { font-size: 13px; font-weight: 800; margin: 20px 0 15px; color: var(--maroon); text-transform: uppercase; letter-spacing: 1px; }
        
        .input-box { margin-bottom: 18px; }
        .input-box label { font-size: 11px; font-weight: 700; color: var(--text-gray); display: block; margin-bottom: 6px; text-transform: uppercase; }
        .input-field {
            width: 100%;
            padding: 14px 15px;
            border-radius: 12px;
            border: 1px solid #eee;
            background: var(--light-gray);
            font-size: 14px;
            outline: none;
            color: var(--text-dark);
            transition: 0.3s;
        }
        .input-field:focus { border-color: var(--maroon); background: #fff; }

        /* Toggle Switches */
        .toggle-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #f2f2f2;
        }
        .toggle-group span { font-size: 14px; font-weight: 600; color: var(--text-dark); }
        
        .switch { position: relative; display: inline-block; width: 42px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ddd; transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--maroon); }
        input:checked + .slider:before { transform: translateX(18px); }

        /* Save Button */
        .save-btn {
            background-color: var(--maroon);
            color: white;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 15px;
            font-weight: 700;
            margin-top: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(128, 19, 19, 0.2);
            transition: 0.3s;
        }
        .save-btn:active { transform: scale(0.98); }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: white;
            display: flex; justify-content: space-around; padding: 12px 0;
            border-top: 1px solid #eee; z-index: 1000;
        }
        .nav-item { text-decoration: none; color: var(--text-gray); font-size: 10px; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }
        .nav-item.active { color: var(--maroon); font-weight: 700; }
    </style>
</head>
<body>

    <div class="profile-header">
        <div class="back-nav">
            <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
        </div>
        
        <div class="img-container" onclick="document.getElementById('imageUpload').click()">
            <img src="https://via.placeholder.com/150" alt="User" class="profile-img" id="profileDisplay">
            <div class="cam-btn"><i class="fa-solid fa-camera"></i></div>
            <input type="file" id="imageUpload" hidden accept="image/*">
        </div>
        <h2 id="userNameDisplay">Mwanachama</h2>
        <p id="userStatus">VIWAWA - KATOLIKI</p>
    </div>

    <div class="container">
        <h3 class="section-title">Taarifa Binafsi</h3>
        
        <div class="input-box">
            <label>Jina Kamili</label>
            <input type="text" id="fullName" class="input-field" placeholder="Weka jina lako">
        </div>
        <div class="input-box">
            <label>Jimbo</label>
            <input type="text" id="jimbo" class="input-field" placeholder="Weka Jimbo">
        </div>
        <div class="input-box">
            <label>Parokia</label>
            <input type="text" id="parokia" class="input-field" placeholder="Weka Parokia">
        </div>
        <div class="input-box">
            <label>Jumuiya</label>
            <input type="text" id="jumuiya" class="input-field" placeholder="Weka Jumuiya">
        </div>

        <h3 class="section-title">Notification Settings</h3>
        
        <div class="toggle-group">
            <span>Announcements</span>
            <label class="switch"><input type="checkbox" id="note1" checked><span class="slider"></span></label>
        </div>
        <div class="toggle-group">
            <span>Bible Verse of Day</span>
            <label class="switch"><input type="checkbox" id="note2" checked><span class="slider"></span></label>
        </div>
        <div class="toggle-group">
            <span>Contribution Updates</span>
            <label class="switch"><input type="checkbox" id="note3"><span class="slider"></span></label>
        </div>

        <button class="save-btn" onclick="saveData()">
            <i class="fa-solid fa-check-circle"></i> HIFADHI TAARIFA
        </button>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fa-solid fa-house"></i>NYUMBANI</a>
        <a href="biblia.html" class="nav-item"><i class="fa-solid fa-book-bible"></i>BIBLIA</a>
        <a href="michango.html" class="nav-item"><i class="fa-solid fa-wallet"></i>MICHANGO</a>
        <a href="mazungumzo.html" class="nav-item"><i class="fa-regular fa-comments"></i>MAZUNGUMZO</a>
        <a href="profile.html" class="nav-item active"><i class="fa-solid fa-user"></i>WASIFU</a>
    </nav>

    <script>
        // Pakia picha na kuipunguza ukubwa ili isijaze localStorage
        document.getElementById('imageUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const imgUrl = event.target.result;
                    document.getElementById('profileDisplay').src = imgUrl;
                    localStorage.setItem('profilePic', imgUrl);
                }
                reader.readAsDataURL(file);
            }
        });

        function saveData() {
            const data = {
                name: document.getElementById('fullName').value,
                jimbo: document.getElementById('jimbo').value,
                parokia: document.getElementById('parokia').value,
                jumuiya: document.getElementById('jumuiya').value,
                note1: document.getElementById('note1').checked,
                note2: document.getElementById('note2').checked,
                note3: document.getElementById('note3').checked
            };
            localStorage.setItem('viwawa_profile', JSON.stringify(data));
            document.getElementById('userNameDisplay').innerText = data.name || "Mwanachama";
            alert("Taarifa zako zimehifadhiwa kikamilifu!");
        }

        window.onload = function() {
            const savedData = JSON.parse(localStorage.getItem('viwawa_profile'));
            const savedPic = localStorage.getItem('profilePic');
            
            if (savedData) {
                document.getElementById('fullName').value = savedData.name || "";
                document.getElementById('userNameDisplay').innerText = savedData.name || "Mwanachama";
                document.getElementById('jimbo').value = savedData.jimbo || "";
                document.getElementById('parokia').value = savedData.parokia || "";
                document.getElementById('jumuiya').value = savedData.jumuiya || "";
                document.getElementById('note1').checked = savedData.note1;
                document.getElementById('note2').checked = savedData.note2;
                document.getElementById('note3').checked = savedData.note3;
            }
            if (savedPic) {
                document.getElementById('profileDisplay').src = savedPic;
            }
        };
    </script>
</body>
</html>
