<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wasifu - Viwawa App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --maroon: #801313;
            --light-gray: #f4f4f4;
            --text-dark: #333;
            --text-gray: #777;
            --yellow: #ffc107;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--white); padding-bottom: 100px; }

        /* Header Section */
        .profile-header {
            background-color: var(--maroon);
            padding: 40px 20px;
            text-align: center;
            color: var(--white);
            border-radius: 0 0 30px 30px;
            position: relative;
        }

        .img-container {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 15px;
        }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 4px solid var(--white);
            object-fit: cover;
            background: #eee;
            display: block;
        }

        .cam-btn {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: var(--yellow);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dark);
            border: 2px solid var(--white);
            cursor: pointer;
        }

        .profile-header h2 { font-size: 20px; font-weight: 700; text-transform: uppercase; margin-top: 10px; }
        .profile-header p { font-size: 13px; opacity: 0.9; font-weight: 600; margin-top: 5px; letter-spacing: 1px; }

        /* Admin Actions */
        .admin-section { padding: 20px; }
        .section-title { font-size: 14px; font-weight: 700; margin-bottom: 15px; color: var(--text-dark); text-transform: uppercase; }
        
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .admin-card {
            background: var(--white);
            border: 1px solid #eee;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            cursor: pointer;
        }
        .admin-card i { font-size: 22px; margin-bottom: 8px; display: block; }
        .admin-card span { font-size: 13px; font-weight: 700; color: var(--text-dark); }

        /* Form Fields */
        .form-section { padding: 0 20px; }
        .input-box { margin-bottom: 15px; }
        .input-box label { font-size: 11px; font-weight: 700; color: var(--text-gray); display: block; margin-bottom: 5px; text-transform: uppercase; }
        .input-field {
            width: 100%;
            padding: 12px 15px;
            border-radius: 12px;
            border: 1px solid #eee;
            background: var(--light-gray);
            font-size: 14px;
            outline: none;
            color: var(--text-dark);
        }

        /* Toggle Switches */
        .toggle-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f9f9f9;
        }
        .toggle-group span { font-size: 14px; font-weight: 600; color: var(--text-dark); }
        
        .switch { position: relative; display: inline-block; width: 42px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc; transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--maroon); }
        input:checked + .slider:before { transform: translateX(18px); }

        /* Save Button */
        .save-btn {
            background-color: var(--maroon);
            color: white;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 15px;
            font-weight: 700;
            margin-top: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(128, 19, 19, 0.2);
        }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: white;
            display: flex; justify-content: space-around; padding: 12px 0;
            border-top: 1px solid #eee; z-index: 1000;
        }
        .nav-item { text-decoration: none; color: var(--text-gray); font-size: 10px; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }
        .nav-item.active { color: var(--maroon); font-weight: 700; }
        .nav-item.active::after { content: '•'; font-size: 12px; margin-top: -2px; }
    </style>
</head>
<body>

    <div class="profile-header">
        <div class="img-container" onclick="document.getElementById('imageUpload').click()">
            <img src="https://via.placeholder.com/150" alt="User" class="profile-img" id="profileDisplay">
            <div class="cam-btn"><i class="fa-solid fa-camera"></i></div>
            <input type="file" id="imageUpload" hidden accept="image/*">
        </div>
        <h2 id="userNameDisplay">Boniventure</h2>
        <p>ADMIN</p>
    </div>

    <div class="admin-section">
        <h3 class="section-title">Admin Actions</h3>
        <div class="admin-grid">
            <div class="admin-card">
                <i class="fa-solid fa-bullhorn" style="color: #fd7e14;"></i>
                <span>TANGAZO</span>
            </div>
            <div class="admin-card">
                <i class="fa-solid fa-wallet" style="color: #e64980;"></i>
                <span>MCHANGO</span>
            </div>
        </div>
    </div>

    <div class="form-section">
        <h3 class="section-title">Taarifa Binafsi</h3>
        
        <div class="input-box">
            <label>Jina Kamili</label>
            <input type="text" id="fullName" class="input-field" placeholder="Weka jina lako">
        </div>
        <div class="input-box">
            <label>Jimbo</label>
            <input type="text" id="jimbo" class="input-field" placeholder="Weka Jimbo">
        </div>
        <div class="input-box">
            <label>Parokia</label>
            <input type="text" id="parokia" class="input-field" placeholder="Weka Parokia">
        </div>
        <div class="input-box">
            <label>Jumuiya</label>
            <input type="text" id="jumuiya" class="input-field" placeholder="Weka Jumuiya">
        </div>

        <h3 class="section-title" style="margin-top: 25px;">Notification Settings</h3>
        
        <div class="toggle-group">
            <span>Announcements</span>
            <label class="switch"><input type="checkbox" id="note1" checked><span class="slider"></span></label>
        </div>
        <div class="toggle-group">
            <span>Bible Verse of Day</span>
            <label class="switch"><input type="checkbox" id="note2" checked><span class="slider"></span></label>
        </div>
        <div class="toggle-group">
            <span>Contribution Updates</span>
            <label class="switch"><input type="checkbox" id="note3"><span class="slider"></span></label>
        </div>

        <button class="save-btn" onclick="saveData()">
            <i class="fa-solid fa-shield-halved"></i> HIFADHI MABADILIKO
        </button>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <i class="fa-solid fa-house"></i>NYUMBANI
        </a>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-book-bible"></i>BIBLIA
        </a>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-wallet"></i>MICHANGO
        </a>
        <a href="#" class="nav-item">
            <i class="fa-regular fa-comments"></i>MAZUNGUMZO
        </a>
        <a href="profile.html" class="nav-item active">
            <i class="fa-solid fa-user"></i>WASIFU
        </a>
    </nav>

    <script>
        // Pakia picha na ionekane papo hapo
        document.getElementById('imageUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById('profileDisplay').src = event.target.result;
                    localStorage.setItem('profilePic', event.target.result);
                }
                reader.readAsDataURL(file);
            }
        });

        // Hifadhi data kwenye LocalStorage
        function saveData() {
            const data = {
                name: document.getElementById('fullName').value,
                jimbo: document.getElementById('jimbo').value,
                parokia: document.getElementById('parokia').value,
                jumuiya: document.getElementById('jumuiya').value,
                note1: document.getElementById('note1').checked,
                note2: document.getElementById('note2').checked,
                note3: document.getElementById('note3').checked
            };
            localStorage.setItem('viwawa_profile', JSON.stringify(data));
            document.getElementById('userNameDisplay').innerText = data.name || "Mwanachama";
            alert("Mabadiliko yamehifadhiwa!");
        }

        // Pakia data iliyohifadhiwa ukurasa ukifunguliwa
        window.onload = function() {
            const savedData = JSON.parse(localStorage.getItem('viwawa_profile'));
            const savedPic = localStorage.getItem('profilePic');
            
            if (savedData) {
                document.getElementById('fullName').value = savedData.name || "";
                document.getElementById('userNameDisplay').innerText = savedData.name || "Boniventure";
                document.getElementById('jimbo').value = savedData.jimbo || "";
                document.getElementById('parokia').value = savedData.parokia || "";
                document.getElementById('jumuiya').value = savedData.jumuiya || "";
                document.getElementById('note1').checked = savedData.note1;
                document.getElementById('note2').checked = savedData.note2;
                document.getElementById('note3').checked = savedData.note3;
            }
            if (savedPic) {
                document.getElementById('profileDisplay').src = savedPic;
            }
        };
    </script>
</body>
</html>
