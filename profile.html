<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wasifu - Viwawa App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --maroon: #801313;
            --light-gray: #f4f4f4;
            --text-dark: #333;
            --text-gray: #777;
            --yellow: #ffc107;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--white); padding-bottom: 100px; }

        /* Header Section */
        .profile-header {
            background-color: var(--maroon);
            padding: 40px 20px;
            text-align: center;
            color: var(--white);
            border-radius: 0 0 30px 30px;
            position: relative;
        }

        .img-container {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 15px;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid var(--white);
            object-fit: cover;
            background: #eee;
        }

        .cam-btn {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: var(--yellow);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dark);
            border: 2px solid var(--white);
            cursor: pointer;
        }

        .profile-header h2 { font-size: 20px; font-weight: 700; text-transform: uppercase; }
        .profile-header p { font-size: 13px; opacity: 0.9; font-weight: 600; margin-top: 5px; }

        /* Admin Actions */
        .admin-section { padding: 20px; }
        .section-title { font-size: 14px; font-weight: 700; margin-bottom: 15px; color: var(--text-dark); }
        
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .admin-card {
            background: var(--white);
            border: 1px solid #eee;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .admin-card i { font-size: 20px; margin-bottom: 8px; display: block; }
        .admin-card span { font-size: 13px; font-weight: 700; color: var(--text-dark); }

        /* Form Fields */
        .form-section { padding: 0 20px; }
        .input-box { margin-bottom: 15px; }
        .input-box label { font-size: 12px; font-weight: 700; color: var(--text-gray); display: block; margin-bottom: 5px; }
        .input-field {
            width: 100%;
            padding: 12px 15px;
            border-radius: 12px;
            border: 1px solid #ddd;
            background: var(--light-gray);
            font-size: 14px;
            outline: none;
        }

        /* Toggle Switches */
        .toggle-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }
        .toggle-group span { font-size: 14px; font-weight: 600; color: var(--text-dark); }
        
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 22px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc; transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--maroon); }
        input:checked + .slider:before { transform: translateX(18px); }

        /* Save Button */
        .save-btn {
            background-color: var(--maroon);
            color: white;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 15px;
            font-weight: 700;
            margin-top: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* Bottom Nav (Kama ya Homepage) */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: white;
            display: flex; justify-content: space-around; padding: 12px 0;
            border-top: 1px solid #eee;
        }
        .nav-item { text-decoration: none; color: var(--text-gray); font-size: 10px; text-align: center; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }
        .nav-item.active { color: var(--maroon); }
    </style>
</head>
<body>

    <div class="profile-header">
        <div class="img-container">
            <img src="https://via.placeholder.com/150" alt="User" class="profile-img" id="user-img">
            <div class="cam-btn"><i class="fa-solid fa-camera"></i></div>
        </div>
        <h2 id="display-name">Boniventure</h2>
        <p>ADMIN</p>
    </div>

    <div class="admin-section">
        <h3 class="section-title">ADMIN ACTIONS</h3>
        <div class="admin-grid">
            <div class="admin-card">
                <i class="fa-solid fa-bullhorn" style="color: #fd7e14;"></i>
                <span>TANGAZO</span>
            </div>
            <div class="admin-card">
                <i class="fa-solid fa-wallet" style="color: #e64980;"></i>
                <span>MCHANGO</span>
            </div>
        </div>
    </div>

    <div class="form-section">
        <h3 class="section-title">TAARIFA BINAFSI</h3>
        
        <div class="input-box">
            <label>JINA KAMILI</label>
            <input type="text" class="input-field" value="Boniventure">
        </div>
        <div class="input-box">
            <label>JIMBO</label>
            <input type="text" class="input-field" placeholder="Weka Jimbo">
        </div>
        <div class="input-box">
            <label>PAROKIA</label>
            <input type="text" class="input-field" placeholder="Weka Parokia">
        </div>
        <div class="input-box">
            <label>JUMUIYA</label>
            <input type="text" class="input-field" placeholder="Weka Jumuiya">
        </div>

        <h3 class="section-title" style="margin-top: 25px;">NOTIFICATION SETTINGS</h3>
        
        <div class="toggle-group">
            <span>Announcements</span>
            <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
        </div>
        <div class="toggle-group">
            <span>Bible Verse of Day</span>
            <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
        </div>
        <div class="toggle-group">
            <span>Contribution Updates</span>
            <label class="switch"><input type="checkbox"><span class="slider"></span></label>
        </div>

        <button class="save-btn">
            <i class="fa-solid fa-shield-halved"></i> HIFADHI MABADILIKO
        </button>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <i class="fa-solid fa-house"></i>NYUMBANI
        </a>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-book-bible"></i>BIBLIA
        </a>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-wallet"></i>MICHANGO
        </a>
        <a href="#" class="nav-item">
            <i class="fa-regular fa-comments"></i>MAZUNGUMZO
        </a>
        <a href="#" class="nav-item active">
            <i class="fa-solid fa-user"></i>WASIFU
        </a>
    </nav>

</body>
</html>
