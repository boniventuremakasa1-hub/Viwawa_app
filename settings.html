<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SETTINGS - VIWAWA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

    <style>
        :root { --primary: #800000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #ffffff; padding-bottom: 50px; }
        
        .app-bar { background-color: var(--primary); color: white; padding: 15px; display: flex; align-items: center; }
        .container { padding: 15px; }
        
        /* Menu ya Settings za Kawaida */
        .settings-item {
            display: flex; align-items: center; padding: 15px;
            border-bottom: 1px solid #eee; cursor: pointer; color: #333;
        }
        .settings-item i { margin-right: 15px; color: var(--primary); width: 20px; text-align: center; }

        /* Sehemu ya Usimamizi (Iliyofichwa) */
        #adminArea { display: none; margin-top: 20px; animation: slideIn 0.4s ease; }
        .admin-card { background: #fff; border: 1px solid #ddd; border-radius: 12px; padding: 15px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .admin-card h2 { color: var(--primary); font-size: 15px; margin-bottom: 15px; text-transform: uppercase; border-bottom: 2px solid #f4f4f4; padding-bottom: 5px; }
        
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; color: #555; }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; outline: none; font-size: 14px; }
        
        .upload-btn { background: var(--primary); color: white; width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .preview-img { width: 100%; max-height: 150px; object-fit: contain; display: none; margin-bottom: 10px; border-radius: 8px; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="app-bar">
        <i class="fa-solid fa-arrow-left" style="margin-right:15px;" onclick="history.back()"></i>
        <h1>SETTINGS</h1>
    </div>

    <div class="container">
        <div class="settings-item"><i class="fa-solid fa-user"></i> Profaili Yangu</div>
        <div class="settings-item"><i class="fa-solid fa-bell"></i> Notifications</div>
        
        <div class="settings-item" onclick="openAdmin()" style="background: #fff9f9; font-weight: bold; border-top: 2px solid #f4f4f4;">
            <i class="fa-solid fa-user-shield"></i> USIMAMIZI (ADMIN)
        </div>

        <div id="adminArea">
            
            <div class="admin-card">
                <h2><i class="fa-solid fa-quote-left"></i> Neno la Leo</h2>
                <textarea id="nenoLeo" placeholder="Andika neno la leo hapa..."></textarea>
                <button class="upload-btn" onclick="updateNeno()">UPDATE NENO</button>
            </div>

            <div class="admin-card">
                <h2><i class="fa-solid fa-bullhorn"></i> Pakia Tangazo</h2>
                <label>Picha (Flyer)</label>
                <input type="file" id="adFile" accept="image/*" onchange="previewAd(this)">
                <img id="adPreview" class="preview-img">
                <input type="text" id="adTitle" placeholder="Kichwa cha Tangazo">
                <textarea id="adMsg" placeholder="Maelezo kamili ya tangazo..."></textarea>
                <button class="upload-btn" onclick="uploadAd()">PAKIA TANGAZO</button>
            </div>

            <div class="admin-card">
                <h2><i class="fa-solid fa-money-bill-trend-up"></i> Michango</h2>
                <input type="text" id="mchangoName" placeholder="Jina la Mchango">
                <input type="text" id="mchangoAmount" placeholder="Kiasi kilichopatikana (Tsh)">
                <input type="text" id="mchangoGoal" placeholder="Lengo kuu (Tsh)">
                <button class="upload-btn" onclick="uploadMchango()">UPDATE MCHANGO</button>
            </div>

        </div>
    </div>

    <script>
        // Copy Firebase Config yako hapa
        const firebaseConfig = {
          apiKey: "AIzaSyDBRoHCdSzu1g9lP9VBjYSeVU4N-wdD-8A",
          authDomain: "viwawa-app.firebaseapp.com",
          databaseURL: "https://viwawa-app-default-rtdb.firebaseio.com",
          projectId: "viwawa-app",
          storageBucket: "viwawa-app.firebasestorage.app",
          messagingSenderId: "523436472007",
          appId: "1:523436472007:web:dda010d18fd00ea60070e2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        // Kazi ya kufungua Admin kwa password
        function openAdmin() {
            const siri = prompt("Ingiza Nenosiri la Usimamizi:");
            if (siri === "Viwawa@2026") {
                document.getElementById('adminArea').style.display = 'block';
                window.scrollTo(0, document.body.scrollHeight);
            } else if (siri !== null) {
                alert("Nenosiri si sahihi!");
            }
        }

        function previewAd(input) {
            const pre = document.getElementById('adPreview');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => { pre.src = e.target.result; pre.style.display = 'block'; }
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function uploadAd() {
            const title = document.getElementById('adTitle').value;
            const msg = document.getElementById('adMsg').value;
            const file = document.getElementById('adFile').files[0];
            if(!title || !msg) return alert("Jaza kichwa na ujumbe!");
            try {
                let imgUrl = "";
                if(file) {
                    const ref = storage.ref('matangazo/' + Date.now());
                    await ref.put(file);
                    imgUrl = await ref.getDownloadURL();
                }
                await db.collection("matangazo").add({
                    kichwa: title, ujumbe: msg, image: imgUrl,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert("Tangazo limepakiwa!");
                location.reload();
            } catch(e) { alert("Imefeli!"); }
        }

        async function uploadMchango() {
            const name = document.getElementById('mchangoName').value;
            const amount = document.getElementById('mchangoAmount').value;
            const goal = document.getElementById('mchangoGoal').value;
            await db.collection("huduma").doc("michango").set({
                jina: name, kiasi: amount, lengo: goal,
                updated: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("Mchango umesasishwa!");
        }

        async function updateNeno() {
            const neno = document.getElementById('nenoLeo').value;
            await db.collection("huduma").doc("neno").set({ maandishi: neno });
            alert("Neno limesasishwa!");
        }
    </script>
</body>
</html>
