<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USIMAMIZI - VIWAWA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

    <style>
        :root { --primary: #800000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #ffffff; padding-bottom: 50px; }
        .app-bar { background-color: var(--primary); color: white; padding: 15px; display: flex; align-items: center; }
        .container { padding: 15px; display: none; } /* Inajificha mpaka password iwekwe */
        
        .admin-card { background: #fff; border: 1px solid #ddd; border-radius: 12px; padding: 15px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .admin-card h2 { color: var(--primary); font-size: 16px; margin-bottom: 15px; border-bottom: 2px solid #f4f4f4; padding-bottom: 5px; }
        
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; color: #555; }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; outline: none; }
        textarea { height: 80px; }
        
        .upload-btn { background: var(--primary); color: white; width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        #login-box { text-align: center; padding: 50px 20px; }
        .preview-img { width: 100%; max-height: 150px; object-fit: contain; display: none; margin-bottom: 10px; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="app-bar">
        <i class="fa-solid fa-gears" style="margin-right:10px;"></i>
        <h1>USIMAMIZI WA APP</h1>
    </div>

    <div id="login-box">
        <i class="fa-solid fa-lock fa-3x" style="color: var(--primary); margin-bottom: 20px;"></i>
        <p style="margin-bottom: 15px;">Ingiza Nenosiri la Usimamizi</p>
        <input type="password" id="passInput" placeholder="Nenosiri..." style="text-align: center;">
        <button class="upload-btn" onclick="checkPass()">FUNGUA USIMAMIZI</button>
    </div>

    <div class="container" id="adminContent">
        
        <div class="admin-card">
            <h2><i class="fa-solid fa-quote-left"></i> BADILI NENO LA LEO</h2>
            <textarea id="nenoLeo" placeholder="Andika neno la leo hapa..."></textarea>
            <button class="upload-btn" onclick="updateNeno()">UPDATE NENO</button>
        </div>

        <div class="admin-card">
            <h2><i class="fa-solid fa-bullhorn"></i> PAKIA TANGAZO JIPYA</h2>
            <label>Picha ya Tangazo</label>
            <input type="file" id="adFile" accept="image/*" onchange="previewAd(this)">
            <img id="adPreview" class="preview-img">
            
            <label>Kichwa cha Tangazo</label>
            <input type="text" id="adTitle" placeholder="Mfano: SEMINA YA VIJANA">
            
            <label>Ujumbe wa Tangazo</label>
            <textarea id="adMsg" placeholder="Maelezo kamili..."></textarea>
            <button class="upload-btn" onclick="uploadAd()">PAKIA TANGAZO</button>
        </div>

        <div class="admin-card">
            <h2><i class="fa-solid fa-hand-holding-dollar"></i> PAKIA MICHANGO</h2>
            <label>Jina la Mchango</label>
            <input type="text" id="mchangoName" placeholder="Mfano: Mchango wa Sherehe">
            
            <label>Kiasi Kilichofikiwa (Tsh)</label>
            <input type="text" id="mchangoAmount" placeholder="Mfano: 500,000">
            
            <label>Lengo Kuu (Tsh)</label>
            <input type="text" id="mchangoGoal" placeholder="Mfano: 1,500,000">
            <button class="upload-btn" onclick="uploadMchango()">UPDATE MCHANGO</button>
        </div>

    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyDBRoHCdSzu1g9lP9VBjYSeVU4N-wdD-8A",
          authDomain: "viwawa-app.firebaseapp.com",
          databaseURL: "https://viwawa-app-default-rtdb.firebaseio.com",
          projectId: "viwawa-app",
          storageBucket: "viwawa-app.firebasestorage.app",
          messagingSenderId: "523436472007",
          appId: "1:523436472007:web:dda010d18fd00ea60070e2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        // 1. Check Password
        function checkPass() {
            const pass = document.getElementById('passInput').value;
            if(pass === "PASSWORD_YAKO") { // Badilisha hapa weka password yako halisi
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
            } else {
                alert("Nenosiri si sahihi!");
            }
        }

        // 2. Preview Picha ya Tangazo
        function previewAd(input) {
            const pre = document.getElementById('adPreview');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => { pre.src = e.target.result; pre.style.display = 'block'; }
                reader.readAsDataURL(input.files[0]);
            }
        }

        // 3. Pakia Tangazo
        async function uploadAd() {
            const title = document.getElementById('adTitle').value;
            const msg = document.getElementById('adMsg').value;
            const file = document.getElementById('adFile').files[0];
            if(!title || !msg) return alert("Jaza kichwa na ujumbe!");

            try {
                let imgUrl = "";
                if(file) {
                    const ref = storage.ref('matangazo/' + Date.now());
                    await ref.put(file);
                    imgUrl = await ref.getDownloadURL();
                }
                await db.collection("matangazo").add({
                    kichwa: title, ujumbe: msg, image: imgUrl,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert("Tangazo limepakiwa!");
                location.reload();
            } catch(e) { alert("Imefeli!"); }
        }

        // 4. Pakia Mchango
        async function uploadMchango() {
            const name = document.getElementById('mchangoName').value;
            const amount = document.getElementById('mchangoAmount').value;
            const goal = document.getElementById('mchangoGoal').value;
            if(!name || !amount) return alert("Jaza jina na kiasi!");

            await db.collection("huduma").doc("michango").set({
                jina: name, kiasi: amount, lengo: goal,
                updated: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("Mchango umesasishwa!");
        }

        // 5. Update Neno
        async function updateNeno() {
            const neno = document.getElementById('nenoLeo').value;
            await db.collection("huduma").doc("neno").set({ maandishi: neno });
            alert("Neno limesasishwa!");
        }
    </script>
</body>
</html>
